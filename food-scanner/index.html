<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#14110d">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Verdict">

<link rel="icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><rect width='64' height='64' rx='14' fill='%2314110d'/><text x='32' y='42' font-size='42' text-anchor='middle' font-family='Georgia,serif' font-weight='bold' fill='%23f5e8d6'>V</text><circle cx='22' cy='54' r='2.4' fill='%235fa67c'/><circle cx='32' cy='54' r='2.4' fill='%23e9a44c'/><circle cx='42' cy='54' r='2.4' fill='%23e76f51'/></svg>">
<title>Verdict</title>
<style>
  *, *::before, *::after { box-sizing: border-box; }
  :root {
    --bg: #14110d;
    --bg-2: #1f1a14;
    --card: #221c15;
    --card-2: #2a221a;
    --border: #3a2f24;
    --border-soft: #2d2419;
    --text: #f5e8d6;
    --text-2: #d4c4a8;
    --muted: #9a8975;
    --gold: #d4a574;
    --good: #5fa67c;
    --warn: #e9a44c;
    --bad: #e76f51;
  }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    min-height: 100vh; min-height: 100dvh;
    -webkit-font-smoothing: antialiased;
    overscroll-behavior-y: contain;
  }
  body {
    background:
      radial-gradient(ellipse at top, #2a1f15 0%, transparent 50%),
      radial-gradient(ellipse at bottom right, #1f1812 0%, transparent 60%),
      var(--bg);
    background-attachment: fixed;
  }
  .serif { font-family: Georgia, "Times New Roman", "Iowan Old Style", serif; }

  .app {
    max-width: 540px;
    margin: 0 auto;
    padding: max(env(safe-area-inset-top), 20px) 20px max(env(safe-area-inset-bottom), 24px);
    min-height: 100dvh;
    display: flex; flex-direction: column;
  }
  header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 28px;
  }
  .brand { display: flex; align-items: center; gap: 10px; }
  .brand-mark {
    width: 32px; height: 32px; border-radius: 8px;
    background: radial-gradient(circle at 30% 25%, #3d2f22, #14110d);
    display: flex; align-items: center; justify-content: center;
    border: 1px solid var(--border);
    position: relative;
  }
  .brand-mark::after {
    content: "";
    position: absolute; bottom: 4px; left: 50%; transform: translateX(-50%);
    width: 18px; height: 2px;
    background: linear-gradient(90deg, var(--good) 0%, var(--good) 33%, var(--warn) 33%, var(--warn) 66%, var(--bad) 66%, var(--bad) 100%);
    border-radius: 1px;
  }
  .brand-mark span {
    font-family: Georgia, serif; font-weight: 700; font-size: 22px;
    color: var(--text); margin-top: -2px;
  }
  .brand-name {
    font-family: Georgia, serif; font-size: 20px; font-weight: 600;
    letter-spacing: -0.01em;
  }
  .brand-tag {
    font-size: 11px; color: var(--muted);
    text-transform: uppercase; letter-spacing: 0.12em;
    margin-top: -2px;
  }
  .pill {
    font-size: 10px; padding: 5px 10px; border-radius: 999px;
    background: rgba(212,165,116,0.08); color: var(--gold);
    border: 1px solid rgba(212,165,116,0.2);
    text-transform: uppercase; letter-spacing: 0.1em; font-weight: 600;
  }

  /* Scan grid — two side-by-side primary buttons */
  .scan-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
  }
  .scan-btn {
    position: relative;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    width: 100%; aspect-ratio: 1.05 / 1;
    background:
      radial-gradient(circle at 50% 35%, #3d2f22, #1f1812);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 24px;
    font-family: Georgia, serif; font-size: 20px; font-weight: 600;
    letter-spacing: -0.01em;
    cursor: pointer;
    overflow: hidden;
    transition: transform 0.15s, border-color 0.2s;
    -webkit-tap-highlight-color: transparent;
    padding: 12px;
  }
  .scan-btn::before {
    content: "";
    position: absolute; inset: 0;
    background: radial-gradient(circle at 50% 35%, rgba(212,165,116,0.12), transparent 60%);
    opacity: 0; transition: opacity 0.3s;
  }
  .scan-btn:hover::before, .scan-btn:focus::before { opacity: 1; }
  .scan-btn:active { transform: scale(0.985); border-color: var(--gold); }
  .scan-btn:disabled { opacity: 0.5; cursor: wait; }
  .scan-icon {
    width: 52px; height: 52px; border-radius: 50%;
    border: 1.5px solid var(--gold);
    display: flex; align-items: center; justify-content: center;
    font-size: 22px; margin-bottom: 10px;
    background: rgba(212,165,116,0.05);
    position: relative;
    color: var(--gold);
    animation: idleBreath 4s ease-in-out infinite;
  }
  .scan-icon svg { width: 26px; height: 26px; }
  .scan-icon::after {
    content: "";
    position: absolute; inset: -5px;
    border-radius: 50%; border: 1px solid rgba(212,165,116,0.15);
    animation: idleRing 4s ease-in-out infinite;
  }
  @keyframes idleBreath {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.04); }
  }
  @keyframes idleRing {
    0%, 100% { transform: scale(1); opacity: 0.4; }
    50% { transform: scale(1.08); opacity: 0.1; }
  }
  .scan-sub {
    font-family: -apple-system, sans-serif;
    font-size: 10px; font-weight: 400; color: var(--muted);
    margin-top: 4px; text-transform: uppercase; letter-spacing: 0.12em;
    text-align: center;
  }

  /* Live barcode scanner modal */
  .bcm {
    position: fixed; inset: 0; z-index: 9999;
    background: #000;
  }
  .bcm[hidden] { display: none !important; }
  .bcm-video {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    object-fit: cover;
  }
  .bcm-mask {
    position: absolute; inset: 0;
    background: rgba(0, 0, 0, 0.45);
  }
  .bcm-frame {
    position: absolute; left: 50%; top: 50%;
    transform: translate(-50%, -50%);
    width: min(78vw, 360px);
    aspect-ratio: 16/10;
    border: 2px solid var(--gold);
    border-radius: 18px;
    box-shadow:
      0 0 24px rgba(212,165,116,0.5),
      inset 0 0 0 1px rgba(212,165,116,0.2);
    animation: bcmPulse 1.6s ease-in-out infinite;
    pointer-events: none;
  }
  .bcm-frame::before, .bcm-frame::after {
    content: ""; position: absolute;
    width: 22px; height: 22px;
    border: 3px solid var(--gold);
  }
  .bcm-frame::before {
    top: -3px; left: -3px;
    border-right: none; border-bottom: none; border-radius: 18px 0 0 0;
  }
  .bcm-frame::after {
    bottom: -3px; right: -3px;
    border-left: none; border-top: none; border-radius: 0 0 18px 0;
  }
  .bcm-line {
    position: absolute; left: 0; right: 0; top: 0; height: 2px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    box-shadow: 0 0 10px var(--gold);
    animation: bcmScan 1.6s ease-in-out infinite;
  }
  @keyframes bcmPulse {
    0%, 100% { box-shadow: 0 0 24px rgba(212,165,116,0.4), inset 0 0 0 1px rgba(212,165,116,0.2); }
    50% { box-shadow: 0 0 36px rgba(212,165,116,0.7), inset 0 0 0 1px rgba(212,165,116,0.3); }
  }
  @keyframes bcmScan {
    0%, 100% { top: 0%; opacity: 0; }
    10% { opacity: 1; }
    90% { opacity: 1; }
    50% { top: 100%; }
  }
  .bcm-header {
    position: absolute; top: 0; left: 0; right: 0;
    padding: max(env(safe-area-inset-top), 14px) 16px 14px;
    display: flex; align-items: center; gap: 14px;
    background: linear-gradient(180deg, rgba(0,0,0,0.6), transparent);
  }
  .bcm-cancel {
    width: 36px; height: 36px; border-radius: 50%;
    background: rgba(0,0,0,0.5);
    border: 1px solid rgba(255,255,255,0.2);
    color: #fff; font-size: 16px; cursor: pointer;
    -webkit-backdrop-filter: blur(10px); backdrop-filter: blur(10px);
    -webkit-tap-highlight-color: transparent;
    display: flex; align-items: center; justify-content: center;
  }
  .bcm-title {
    color: #fff; font-size: 16px; font-weight: 600;
    font-family: Georgia, serif;
  }
  .bcm-status {
    position: absolute; left: 16px; right: 16px;
    bottom: max(env(safe-area-inset-bottom), 24px);
    text-align: center;
    color: #fff; font-size: 13px;
    padding: 12px 16px;
    background: rgba(0,0,0,0.55);
    -webkit-backdrop-filter: blur(10px); backdrop-filter: blur(10px);
    border-radius: 12px;
    letter-spacing: 0.04em;
  }

  /* Barcode result preview card */
  .bc-card {
    margin-top: 14px;
    padding: 14px 16px;
    border-radius: 14px;
    background: var(--card);
    border: 1px solid var(--border);
    display: flex; align-items: center; gap: 12px;
  }
  .bc-card-icon {
    width: 32px; height: 32px; border-radius: 8px;
    background: rgba(212,165,116,0.1);
    color: var(--gold);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .bc-card-text { flex: 1; min-width: 0; }
  .bc-card-name {
    font-size: 14px; font-weight: 600; color: var(--text);
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .bc-card-meta {
    font-size: 11px; color: var(--muted); margin-top: 2px;
    letter-spacing: 0.04em;
  }

  .upload-row { display: flex; gap: 8px; margin-top: 12px; }
  .upload-row button {
    flex: 1; padding: 13px; background: transparent;
    color: var(--text-2);
    border: 1px solid var(--border);
    border-radius: 12px; font-size: 13px; cursor: pointer;
    transition: border-color 0.15s, color 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .upload-row button:active { border-color: var(--gold); color: var(--text); }
  input[type="file"] { display: none; }

  /* Portion + note row */
  .opts {
    margin-top: 18px;
    padding: 14px;
    background: rgba(255,255,255,0.015);
    border: 1px solid var(--border-soft);
    border-radius: 14px;
  }
  .opts-label {
    font-size: 10px; font-weight: 600; letter-spacing: 0.16em;
    text-transform: uppercase; color: var(--muted);
    margin-bottom: 8px;
  }
  .portion-row {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px;
  }
  .portion-btn {
    padding: 8px 4px;
    background: transparent;
    color: var(--text-2);
    border: 1px solid var(--border);
    border-radius: 9px;
    font-size: 12px; font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .portion-btn:active { transform: scale(0.97); }
  .portion-btn.active {
    background: rgba(212,165,116,0.1);
    border-color: var(--gold);
    color: var(--text);
  }
  .note-toggle {
    display: block;
    margin-top: 12px;
    background: none; border: none; padding: 0;
    color: var(--muted); font-size: 12px;
    cursor: pointer; -webkit-tap-highlight-color: transparent;
  }
  .note-toggle:active { color: var(--gold); }
  .note-input {
    margin-top: 10px;
    width: 100%; padding: 11px 13px;
    background: var(--bg-2);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 10px;
    font-size: 13px; font-family: inherit;
    -webkit-tap-highlight-color: transparent;
  }
  .note-input:focus { outline: none; border-color: var(--gold); }
  .note-input::placeholder { color: var(--muted); }

  /* Source badge in result */
  .source-badge {
    display: inline-flex; align-items: center; gap: 4px;
    margin-left: auto;
    font-size: 10px; font-weight: 600; letter-spacing: 0.1em;
    text-transform: uppercase; color: var(--muted);
  }
  .source-badge::before {
    content: ""; width: 4px; height: 4px; border-radius: 50%;
    background: var(--gold);
  }

  /* Status */
  .status {
    margin-top: 18px; text-align: center;
    color: var(--muted); font-size: 13px; min-height: 18px;
    letter-spacing: 0.04em;
  }

  /* Preview with scan line */
  .preview {
    margin-top: 16px; border-radius: 18px; overflow: hidden;
    border: 1px solid var(--border); position: relative;
    background: var(--card);
  }
  .preview img { width: 100%; display: block; }
  .preview.loading::after {
    content: "";
    position: absolute; left: 0; right: 0; top: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    box-shadow: 0 0 14px var(--gold), 0 0 28px var(--gold);
    animation: scanLine 1.4s ease-in-out infinite;
  }
  .preview.loading::before {
    content: "";
    position: absolute; inset: 0;
    background: linear-gradient(180deg, transparent, rgba(212,165,116,0.04), transparent);
    background-size: 100% 200%;
    animation: scanGlow 1.4s ease-in-out infinite;
    pointer-events: none;
  }
  @keyframes scanLine {
    0% { transform: translateY(0%); opacity: 0; }
    10% { opacity: 1; }
    90% { opacity: 1; }
    100% { transform: translateY(60000%); opacity: 0; }
  }
  @keyframes scanGlow {
    0% { background-position: 0 -100%; }
    100% { background-position: 0 200%; }
  }

  /* Result card */
  .result-wrap { margin-top: 22px; animation: slideUp 0.4s cubic-bezier(0.2, 0.7, 0.2, 1); }
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(20px) scale(0.97); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }
  .result {
    padding: 24px 22px 22px;
    border-radius: 22px;
    background: var(--card);
    border: 1px solid var(--border);
    position: relative; overflow: hidden;
  }
  .result::before {
    content: "";
    position: absolute; left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--muted);
  }
  .result.v-good::before { background: var(--good); }
  .result.v-sometimes::before { background: var(--warn); }
  .result.v-avoid::before { background: var(--bad); }
  .result.v-unclear::before { background: var(--muted); }

  .verdict-row { display: flex; align-items: flex-start; gap: 16px; }
  .verdict-mark {
    flex-shrink: 0;
    width: 56px; height: 56px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-family: Georgia, serif; font-weight: 700; font-size: 30px;
    animation: markPulse 0.6s cubic-bezier(0.2, 0.7, 0.2, 1);
  }
  .v-good .verdict-mark { background: rgba(95,166,124,0.12); color: var(--good); border: 1px solid rgba(95,166,124,0.3); }
  .v-sometimes .verdict-mark { background: rgba(233,164,76,0.12); color: var(--warn); border: 1px solid rgba(233,164,76,0.3); }
  .v-avoid .verdict-mark { background: rgba(231,111,81,0.12); color: var(--bad); border: 1px solid rgba(231,111,81,0.3); }
  .v-unclear .verdict-mark { background: rgba(154,137,117,0.1); color: var(--muted); border: 1px solid var(--border); font-size: 26px; }
  @keyframes markPulse {
    0% { transform: scale(0.6); opacity: 0; }
    60% { transform: scale(1.1); }
    100% { transform: scale(1); opacity: 1; }
  }

  .verdict-text { flex: 1; min-width: 0; }
  .verdict-meta {
    display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
    margin-bottom: 6px;
  }
  .verdict-label {
    font-size: 11px; font-weight: 600; letter-spacing: 0.16em;
    text-transform: uppercase;
  }
  .v-good .verdict-label { color: var(--good); }
  .v-sometimes .verdict-label { color: var(--warn); }
  .v-avoid .verdict-label { color: var(--bad); }
  .v-unclear .verdict-label { color: var(--muted); }

  .proc-chip {
    font-size: 10px; font-weight: 600; letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 3px 8px; border-radius: 999px;
    border: 1px solid;
  }
  .proc-whole { color: var(--good); border-color: rgba(95,166,124,0.4); background: rgba(95,166,124,0.08); }
  .proc-minimal { color: #8db89c; border-color: rgba(141,184,156,0.35); background: rgba(141,184,156,0.06); }
  .proc-processed { color: var(--gold); border-color: rgba(212,165,116,0.35); background: rgba(212,165,116,0.07); }
  .proc-ultra { color: var(--bad); border-color: rgba(231,111,81,0.4); background: rgba(231,111,81,0.08); }
  .proc-unknown { color: var(--muted); border-color: var(--border); }
  .headline {
    font-family: Georgia, serif;
    font-size: 22px; font-weight: 600; line-height: 1.25;
    letter-spacing: -0.01em;
    color: var(--text);
  }
  .summary {
    margin-top: 14px; padding-top: 14px;
    border-top: 1px dashed var(--border-soft);
    font-size: 14px; line-height: 1.55; color: var(--text-2);
  }

  .flags { margin-top: 14px; display: flex; flex-direction: column; gap: 8px; }
  .flag {
    display: flex; gap: 11px; align-items: flex-start;
    padding: 11px 13px; border-radius: 11px;
    background: var(--card-2);
    border: 1px solid var(--border-soft);
    font-size: 13px; line-height: 1.45;
    animation: flagIn 0.4s cubic-bezier(0.2, 0.7, 0.2, 1) backwards;
  }
  .flag:nth-child(1) { animation-delay: 0.1s; }
  .flag:nth-child(2) { animation-delay: 0.18s; }
  .flag:nth-child(3) { animation-delay: 0.26s; }
  .flag:nth-child(4) { animation-delay: 0.34s; }
  .flag:nth-child(5) { animation-delay: 0.42s; }
  @keyframes flagIn {
    from { opacity: 0; transform: translateX(-8px); }
    to { opacity: 1; transform: translateX(0); }
  }
  .flag-dot {
    width: 6px; height: 6px; border-radius: 50%; margin-top: 7px;
    flex-shrink: 0;
  }
  .flag-red .flag-dot { background: var(--bad); box-shadow: 0 0 6px rgba(231,111,81,0.5); }
  .flag-yellow .flag-dot { background: var(--warn); box-shadow: 0 0 6px rgba(233,164,76,0.5); }
  .flag-green .flag-dot { background: var(--good); box-shadow: 0 0 6px rgba(95,166,124,0.5); }
  .flag-name { font-weight: 600; color: var(--text); }
  .flag-why { color: var(--muted); margin-top: 1px; }

  .alternative {
    margin-top: 14px;
    padding: 14px 16px;
    border-radius: 12px;
    background: linear-gradient(135deg, rgba(212,165,116,0.08), rgba(212,165,116,0.03));
    border: 1px solid rgba(212,165,116,0.2);
    border-left: 2px solid var(--gold);
    font-family: Georgia, serif;
    font-size: 14px; line-height: 1.5;
    color: var(--text-2);
    font-style: italic;
  }
  .alternative-label {
    display: block;
    font-family: -apple-system, sans-serif; font-style: normal;
    font-size: 10px; font-weight: 700;
    color: var(--gold);
    text-transform: uppercase; letter-spacing: 0.16em;
    margin-bottom: 5px;
  }

  /* History */
  .history { margin-top: 32px; padding-bottom: 12px; }
  .history-head {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 12px;
  }
  .history-head h2 {
    font-size: 11px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.16em;
    color: var(--muted); margin: 0;
  }
  .clear-btn {
    background: none; border: none; color: var(--muted); font-size: 12px;
    cursor: pointer; padding: 0; -webkit-tap-highlight-color: transparent;
  }
  .clear-btn:active { color: var(--bad); }
  .history-row {
    display: flex; gap: 12px; align-items: center;
    padding: 11px 14px; border-radius: 12px;
    background: var(--card); border: 1px solid var(--border-soft);
    margin-bottom: 6px;
  }
  .history-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .history-dot.good { background: var(--good); box-shadow: 0 0 6px rgba(95,166,124,0.5); }
  .history-dot.sometimes { background: var(--warn); box-shadow: 0 0 6px rgba(233,164,76,0.5); }
  .history-dot.avoid { background: var(--bad); box-shadow: 0 0 6px rgba(231,111,81,0.5); }
  .history-dot.unclear { background: var(--muted); }
  .history-text { flex: 1; min-width: 0; }
  .history-headline {
    font-size: 13px; color: var(--text);
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .history-time { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .history-proc {
    font-size: 10px; font-weight: 600; letter-spacing: 0.06em;
    text-transform: uppercase;
  }
  .history-proc.proc-whole { color: var(--good); }
  .history-proc.proc-minimal { color: #8db89c; }
  .history-proc.proc-processed { color: var(--gold); }
  .history-proc.proc-ultra { color: var(--bad); }

  /* Spinner */
  .spinner {
    width: 14px; height: 14px; border-radius: 50%;
    border: 1.5px solid rgba(212,165,116,0.2); border-top-color: var(--gold);
    animation: spin 0.7s linear infinite;
    display: inline-block; vertical-align: -2px; margin-right: 8px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Error */
  .error {
    margin-top: 16px; padding: 13px 15px; border-radius: 12px;
    background: rgba(231,111,81,0.08);
    border: 1px solid rgba(231,111,81,0.25);
    border-left: 2px solid var(--bad);
    color: #f4a896; font-size: 13px; line-height: 1.45;
  }

  /* Footer credit */
  .footer {
    margin-top: auto; padding-top: 24px;
    text-align: center; font-size: 10px;
    color: var(--muted); opacity: 0.6;
    letter-spacing: 0.12em; text-transform: uppercase;
  }
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="brand">
      <div class="brand-mark"><span>V</span></div>
      <div>
        <div class="brand-name serif">Verdict</div>
        <div class="brand-tag">Personal food advisor</div>
      </div>
    </div>
    <span class="pill">Live</span>
  </header>

  <div class="scan-grid">
    <button id="barcodeBtn" class="scan-btn" aria-label="Scan barcode">
      <div class="scan-icon">
        <svg viewBox="0 0 24 24" fill="currentColor"><rect x="2" y="4" width="2" height="16"/><rect x="5" y="4" width="1" height="16"/><rect x="7" y="4" width="3" height="16"/><rect x="11" y="4" width="1" height="16"/><rect x="13" y="4" width="2" height="16"/><rect x="16" y="4" width="3" height="16"/><rect x="20" y="4" width="2" height="16"/></svg>
      </div>
      <span>Barcode</span>
      <span class="scan-sub">Fastest for packs</span>
    </button>
    <button id="cameraBtn" class="scan-btn" aria-label="Take photo">
      <div class="scan-icon">⌖</div>
      <span>Photo</span>
      <span class="scan-sub">Label · Plate</span>
    </button>
  </div>

  <div class="upload-row">
    <button id="uploadBtn">Choose from photos</button>
  </div>

  <div class="opts">
    <div class="opts-label">Portion</div>
    <div class="portion-row" id="portionRow">
      <button class="portion-btn" data-portion="small">Small</button>
      <button class="portion-btn active" data-portion="medium">Medium</button>
      <button class="portion-btn" data-portion="large">Large</button>
      <button class="portion-btn" data-portion="whole">Whole pack</button>
    </div>
    <button class="note-toggle" id="noteToggle">+ Add context (optional)</button>
    <input type="text" class="note-input" id="noteInput" placeholder="e.g. 'kalbi at Yori Korean BBQ'" hidden>
  </div>

  <input type="file" id="cameraInput" accept="image/*" capture="environment">
  <input type="file" id="uploadInput" accept="image/*">

  <div class="status" id="status"></div>
  <div id="preview"></div>
  <div id="result"></div>
  <div id="error"></div>

  <div class="history" id="historyWrap" style="display:none">
    <div class="history-head">
      <h2>Recent scans</h2>
      <button class="clear-btn" id="clearBtn">Clear</button>
    </div>
    <div id="historyList"></div>
  </div>

  <div class="footer">A personal app · Hosted privately</div>
</div>

<!-- Live barcode scanner modal -->
<div class="bcm" id="barcodeModal" hidden>
  <video class="bcm-video" id="bcmVideo" playsinline autoplay muted></video>
  <div class="bcm-mask"></div>
  <div class="bcm-frame"><div class="bcm-line"></div></div>
  <div class="bcm-header">
    <button class="bcm-cancel" id="bcmCancel" aria-label="Cancel">✕</button>
    <div class="bcm-title">Scan barcode</div>
  </div>
  <div class="bcm-status" id="bcmStatus">Point camera at a barcode</div>
</div>

<script>
const HISTORY_KEY = 'foodScanner.history.v2';
const PORTION_KEY = 'foodScanner.portion';
const MAX_HISTORY = 25;
const $ = (id) => document.getElementById(id);

// Portion state
let currentPortion = localStorage.getItem(PORTION_KEY) || 'medium';

function setPortion(p) {
  currentPortion = p;
  localStorage.setItem(PORTION_KEY, p);
  document.querySelectorAll('.portion-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.portion === p);
  });
}

// ===== Barcode detection (native BarcodeDetector if available) =====
async function tryDetectBarcode(imgOrCanvas) {
  if (!('BarcodeDetector' in window)) return null;
  try {
    const detector = new window.BarcodeDetector({
      formats: ['ean_13', 'ean_8', 'upc_a', 'upc_e', 'code_128', 'code_39', 'code_93', 'itf']
    });
    const codes = await detector.detect(imgOrCanvas);
    if (codes && codes.length > 0) {
      return codes[0].rawValue;
    }
  } catch {}
  return null;
}

// ===== Open Food Facts lookup =====
async function lookupBarcode(code) {
  const fields = 'product_name,brands,ingredients_text,allergens_tags,nova_group,nutriscore_grade,nutriments';
  const url = `https://world.openfoodfacts.org/api/v2/product/${encodeURIComponent(code)}.json?fields=${fields}`;
  try {
    const r = await fetch(url);
    if (!r.ok) return null;
    const data = await r.json();
    if (data.status !== 1 || !data.product) return null;
    const p = data.product;
    if (!p.ingredients_text && !p.product_name) return null;
    return {
      barcode: code,
      name: p.product_name || '',
      brand: p.brands || '',
      ingredients: p.ingredients_text || '',
      allergens: (p.allergens_tags || []).map(t => t.replace(/^en:/, '')).join(', '),
      nova_group: p.nova_group || null,
      nutriscore: p.nutriscore_grade || null,
      nutriments: p.nutriments || null,
    };
  } catch {
    return null;
  }
}

// ===== Compress image. Also returns the source image element so we can run
// barcode detection on the original-resolution image (better detection rate).
async function compressImage(file, maxDim = 1280, quality = 0.78) {
  const dataUrl = await new Promise((resolve, reject) => {
    const r = new FileReader();
    r.onload = () => resolve(r.result);
    r.onerror = reject;
    r.readAsDataURL(file);
  });
  const img = await new Promise((resolve, reject) => {
    const i = new Image();
    i.onload = () => resolve(i);
    i.onerror = reject;
    i.src = dataUrl;
  });
  const ratio = Math.min(1, maxDim / Math.max(img.width, img.height));
  const w = Math.round(img.width * ratio);
  const h = Math.round(img.height * ratio);
  const canvas = document.createElement('canvas');
  canvas.width = w; canvas.height = h;
  const ctx = canvas.getContext('2d');
  ctx.drawImage(img, 0, 0, w, h);
  return { dataUrl: canvas.toDataURL('image/jpeg', quality), sourceImage: img };
}
function dataUrlToParts(dataUrl) {
  const m = dataUrl.match(/^data:([^;]+);base64,(.*)$/);
  if (!m) throw new Error('Invalid data URL');
  return { mime: m[1], base64: m[2] };
}
function escape(s) {
  return String(s).replace(/[&<>"']/g, c => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
  }[c]));
}

// ===== Render verdict =====
function renderResult(r) {
  const v = (r.verdict || 'unclear').toLowerCase();
  const cls = `v-${['good','sometimes','avoid','unclear'].includes(v) ? v : 'unclear'}`;

  const marks = { good: '✓', sometimes: '~', avoid: '✕', unclear: '?' };
  const labels = { good: 'Good for you', sometimes: 'Sometimes', avoid: 'Avoid', unclear: 'Unclear' };

  const procLabels = {
    whole: 'Whole food',
    minimal: 'Minimally processed',
    processed: 'Processed',
    ultra: 'Ultra-processed',
    unknown: '',
  };
  const proc = (r.processing || 'unknown').toLowerCase();
  const procLabel = procLabels[proc] ?? '';
  const procChipHtml = procLabel
    ? `<span class="proc-chip proc-${proc}">${procLabel}</span>`
    : '';

  const flagsHtml = (r.flags || []).map(f => {
    const lvl = (f.level || 'yellow').toLowerCase();
    return `<div class="flag flag-${lvl}">
      <div class="flag-dot"></div>
      <div><div class="flag-name">${escape(f.ingredient || '')}</div><div class="flag-why">${escape(f.why || '')}</div></div>
    </div>`;
  }).join('');

  const altHtml = r.alternative
    ? `<div class="alternative"><span class="alternative-label">Suggestion</span>${escape(r.alternative)}</div>`
    : '';

  const sourceBadge = r._source === 'barcode'
    ? `<span class="source-badge">Via barcode</span>` : '';

  $('result').innerHTML = `
    <div class="result-wrap">
      <div class="result ${cls}">
        <div class="verdict-row">
          <div class="verdict-mark">${marks[v] || '?'}</div>
          <div class="verdict-text">
            <div class="verdict-meta">
              <span class="verdict-label">${labels[v] || 'Unclear'}</span>
              ${procChipHtml}
              ${sourceBadge}
            </div>
            <div class="headline">${escape(r.headline || '')}</div>
          </div>
        </div>
        ${r.summary ? `<div class="summary">${escape(r.summary)}</div>` : ''}
        ${flagsHtml ? `<div class="flags">${flagsHtml}</div>` : ''}
        ${altHtml}
      </div>
    </div>
  `;
}

// ===== History =====
function loadHistory() {
  try { return JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]'); }
  catch { return []; }
}
function saveHistory(arr) {
  localStorage.setItem(HISTORY_KEY, JSON.stringify(arr.slice(0, MAX_HISTORY)));
}
function addToHistory(result) {
  const hist = loadHistory();
  hist.unshift({
    t: Date.now(),
    verdict: result.verdict || 'unclear',
    processing: result.processing || 'unknown',
    headline: result.headline || '',
  });
  saveHistory(hist);
  renderHistory();
}
function renderHistory() {
  const hist = loadHistory();
  if (!hist.length) { $('historyWrap').style.display = 'none'; return; }
  $('historyWrap').style.display = 'block';
  const procShort = { whole: 'Whole', minimal: 'Minimal', processed: 'Processed', ultra: 'Ultra-proc' };
  $('historyList').innerHTML = hist.map(h => {
    const procTag = h.processing && procShort[h.processing]
      ? `<span class="history-proc proc-${h.processing}">${procShort[h.processing]}</span>` : '';
    return `<div class="history-row">
      <div class="history-dot ${h.verdict}"></div>
      <div class="history-text">
        <div class="history-headline">${escape(h.headline)}</div>
        <div class="history-time">${relTime(h.t)}${procTag ? ' · ' + procTag : ''}</div>
      </div>
    </div>`;
  }).join('');
}
function relTime(t) {
  const d = (Date.now() - t) / 1000;
  if (d < 60) return 'just now';
  if (d < 3600) return Math.round(d / 60) + ' min ago';
  if (d < 86400) return Math.round(d / 3600) + ' h ago';
  return new Date(t).toLocaleDateString('en-GB', { day: '2-digit', month: 'short' });
}

// ===== Scan flow =====
async function handleFile(file) {
  if (!file) return;
  $('error').innerHTML = '';
  $('result').innerHTML = '';
  $('cameraBtn').disabled = true;
  $('status').innerHTML = '<span class="spinner"></span>Compressing image';

  let compressed;
  try { compressed = await compressImage(file); }
  catch (e) {
    showError('Could not read photo: ' + e.message);
    $('cameraBtn').disabled = false; $('status').innerHTML = '';
    return;
  }
  const { dataUrl, sourceImage } = compressed;
  $('preview').innerHTML = `<div class="preview loading"><img src="${dataUrl}"></div>`;
  const { mime, base64 } = dataUrlToParts(dataUrl);
  const noteVal = ($('noteInput').value || '').trim();

  // ===== Try barcode detection on the original (un-compressed) image =====
  $('status').innerHTML = '<span class="spinner"></span>Looking for a barcode';
  let productData = null;
  const barcode = await tryDetectBarcode(sourceImage);
  if (barcode) {
    $('status').innerHTML = '<span class="spinner"></span>Barcode found · looking up product';
    productData = await lookupBarcode(barcode);
  }

  // ===== Build payload =====
  const payload = { portion: currentPortion, note: noteVal };
  if (productData) {
    // Text-only path (cheap + fast)
    payload.productData = productData;
  } else {
    // Image path (vision)
    payload.image = base64;
    payload.mime = mime;
  }

  $('status').innerHTML = productData
    ? '<span class="spinner"></span>Reading ' + (productData.name || 'product')
    : '<span class="spinner"></span>Reading the ingredients';

  let resp;
  try {
    resp = await fetch('/api/scan', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });
  } catch (e) {
    showError('Network error: ' + e.message);
    $('cameraBtn').disabled = false; $('status').innerHTML = '';
    document.querySelector('.preview')?.classList.remove('loading');
    return;
  }

  $('cameraBtn').disabled = false;
  $('status').innerHTML = '';
  document.querySelector('.preview')?.classList.remove('loading');

  if (!resp.ok) {
    const t = await resp.text();
    showError('Server error (' + resp.status + '): ' + t.slice(0, 200));
    return;
  }

  let result;
  try { result = await resp.json(); }
  catch { showError('Bad response from server.'); return; }

  if (result.error) { showError(result.error); return; }

  renderResult(result);
  addToHistory(result);
}

function showError(msg) {
  $('error').innerHTML = `<div class="error">${escape(msg)}</div>`;
}

// ===== Live barcode scanner =====
let bcmStream = null;
let bcmStopped = false;

async function openBarcodeScanner() {
  if (!('BarcodeDetector' in window)) {
    showError('Live barcode scanning needs iOS Safari 17+ or Chrome. Use the Photo button — it will still try to detect a barcode in the photo.');
    return;
  }
  if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
    showError('Camera access not available. Use the Photo button instead.');
    return;
  }

  $('error').innerHTML = '';
  $('barcodeModal').hidden = false;
  $('bcmStatus').textContent = 'Starting camera…';
  bcmStopped = false;

  try {
    bcmStream = await navigator.mediaDevices.getUserMedia({
      video: {
        facingMode: { ideal: 'environment' },
        width: { ideal: 1920 },
        height: { ideal: 1080 },
      },
      audio: false,
    });
  } catch (e) {
    closeBarcodeModal();
    showError('Camera access denied: ' + (e.message || e.name));
    return;
  }

  const video = $('bcmVideo');
  video.srcObject = bcmStream;
  try { await video.play(); } catch {}

  $('bcmStatus').textContent = 'Point at a barcode — auto-captures when seen';

  let detector;
  try {
    detector = new window.BarcodeDetector({
      formats: ['ean_13', 'ean_8', 'upc_a', 'upc_e', 'code_128', 'code_39', 'code_93', 'itf']
    });
  } catch {
    closeBarcodeModal();
    showError('Could not initialise barcode detector.');
    return;
  }

  let lastDetect = 0;
  async function loop() {
    if (bcmStopped) return;
    const now = performance.now();
    if (now - lastDetect > 200) {
      lastDetect = now;
      try {
        const codes = await detector.detect(video);
        if (codes && codes.length > 0) {
          const code = codes[0].rawValue;
          if (code && /^\d{6,14}$/.test(code)) {
            if (navigator.vibrate) navigator.vibrate(80);
            $('bcmStatus').textContent = 'Got it: ' + code;
            stopBarcodeScanner();
            $('barcodeModal').hidden = true;
            await handleBarcodeFound(code);
            return;
          }
        }
      } catch {}
    }
    requestAnimationFrame(loop);
  }
  loop();
}

function stopBarcodeScanner() {
  bcmStopped = true;
  if (bcmStream) {
    bcmStream.getTracks().forEach(t => t.stop());
    bcmStream = null;
  }
  const v = $('bcmVideo');
  if (v) v.srcObject = null;
}

function closeBarcodeModal() {
  stopBarcodeScanner();
  $('barcodeModal').hidden = true;
}

async function handleBarcodeFound(code) {
  $('error').innerHTML = '';
  $('result').innerHTML = '';
  $('preview').innerHTML = `
    <div class="bc-card">
      <div class="bc-card-icon">
        <svg viewBox="0 0 24 24" fill="currentColor" width="18" height="18"><rect x="2" y="4" width="2" height="16"/><rect x="5" y="4" width="1" height="16"/><rect x="7" y="4" width="3" height="16"/><rect x="11" y="4" width="1" height="16"/><rect x="13" y="4" width="2" height="16"/><rect x="16" y="4" width="3" height="16"/><rect x="20" y="4" width="2" height="16"/></svg>
      </div>
      <div class="bc-card-text">
        <div class="bc-card-name">Barcode <span class="mono">${escape(code)}</span></div>
        <div class="bc-card-meta">Looking up product…</div>
      </div>
    </div>`;
  $('barcodeBtn').disabled = true;
  $('cameraBtn').disabled = true;
  $('status').innerHTML = '<span class="spinner"></span>Looking up product';

  const productData = await lookupBarcode(code);
  if (!productData) {
    $('barcodeBtn').disabled = false;
    $('cameraBtn').disabled = false;
    $('status').innerHTML = '';
    showError('Product ' + code + ' not found in Open Food Facts. Try the Photo button to scan the ingredient list.');
    return;
  }

  // Update preview card with product info
  $('preview').innerHTML = `
    <div class="bc-card">
      <div class="bc-card-icon">
        <svg viewBox="0 0 24 24" fill="currentColor" width="18" height="18"><rect x="2" y="4" width="2" height="16"/><rect x="5" y="4" width="1" height="16"/><rect x="7" y="4" width="3" height="16"/><rect x="11" y="4" width="1" height="16"/><rect x="13" y="4" width="2" height="16"/><rect x="16" y="4" width="3" height="16"/><rect x="20" y="4" width="2" height="16"/></svg>
      </div>
      <div class="bc-card-text">
        <div class="bc-card-name">${escape(productData.name || 'Unknown product')}</div>
        <div class="bc-card-meta">${productData.brand ? escape(productData.brand) + ' · ' : ''}${escape(code)}</div>
      </div>
    </div>`;

  $('status').innerHTML = '<span class="spinner"></span>Reading the ingredients';

  const noteVal = ($('noteInput').value || '').trim();
  const payload = { portion: currentPortion, note: noteVal, productData };

  let resp;
  try {
    resp = await fetch('/api/scan', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });
  } catch (e) {
    showError('Network error: ' + e.message);
    $('barcodeBtn').disabled = false;
    $('cameraBtn').disabled = false;
    $('status').innerHTML = '';
    return;
  }

  $('barcodeBtn').disabled = false;
  $('cameraBtn').disabled = false;
  $('status').innerHTML = '';

  if (!resp.ok) {
    const t = await resp.text();
    showError('Server error (' + resp.status + '): ' + t.slice(0, 200));
    return;
  }

  let result;
  try { result = await resp.json(); }
  catch { showError('Bad response from server.'); return; }

  if (result.error) { showError(result.error); return; }

  renderResult(result);
  addToHistory(result);
}

// ===== Wire up =====
$('barcodeBtn').addEventListener('click', openBarcodeScanner);
$('bcmCancel').addEventListener('click', closeBarcodeModal);
$('cameraBtn').addEventListener('click', () => $('cameraInput').click());
$('uploadBtn').addEventListener('click', () => $('uploadInput').click());
$('cameraInput').addEventListener('change', (e) => handleFile(e.target.files[0]));
$('uploadInput').addEventListener('change', (e) => handleFile(e.target.files[0]));
$('clearBtn').addEventListener('click', () => {
  if (confirm('Clear scan history?')) { saveHistory([]); renderHistory(); }
});

// Portion buttons
document.querySelectorAll('.portion-btn').forEach(btn => {
  btn.addEventListener('click', () => setPortion(btn.dataset.portion));
});
setPortion(currentPortion); // restore from localStorage

// Note toggle
$('noteToggle').addEventListener('click', () => {
  const input = $('noteInput');
  const hidden = input.hidden;
  input.hidden = !hidden;
  if (!hidden) {
    input.value = '';
    $('noteToggle').textContent = '+ Add context (optional)';
  } else {
    $('noteToggle').textContent = '− Hide context';
    setTimeout(() => input.focus(), 50);
  }
});

renderHistory();
</script>
</body>
</html>
