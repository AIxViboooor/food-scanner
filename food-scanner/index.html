<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Verdict">
<link rel="manifest" href="/manifest.json">

<title>Verdict</title>
<style>
  *, *::before, *::after { box-sizing: border-box; }
  :root {
    --bg: #14110d;
    --bg-2: #1f1a14;
    --card: #221c15;
    --card-2: #2a221a;
    --border: #3a2f24;
    --border-soft: #2d2419;
    --text: #f5e8d6;
    --text-2: #d4c4a8;
    --muted: #9a8975;
    --gold: #d4a574;
    --good: #5fa67c;
    --warn: #e9a44c;
    --bad: #e76f51;
  }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    min-height: 100vh; min-height: 100dvh;
    -webkit-font-smoothing: antialiased;
    overscroll-behavior-y: contain;
  }
  body {
    background:
      radial-gradient(ellipse at top, #2a1f15 0%, transparent 50%),
      radial-gradient(ellipse at bottom right, #1f1812 0%, transparent 60%),
      var(--bg);
    background-attachment: fixed;
  }
  .serif { font-family: Georgia, "Times New Roman", "Iowan Old Style", serif; }

  .app {
    max-width: 540px;
    margin: 0 auto;
    padding: max(env(safe-area-inset-top), 20px) 20px max(env(safe-area-inset-bottom), 24px);
    min-height: 100dvh;
    display: flex; flex-direction: column;
  }
  header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 28px;
  }
  .brand { display: flex; align-items: center; gap: 10px; }
  .brand-mark {
    width: 32px; height: 32px; border-radius: 8px;
    background: radial-gradient(circle at 30% 25%, #3d2f22, #14110d);
    display: flex; align-items: center; justify-content: center;
    border: 1px solid var(--border);
    position: relative;
  }
  .brand-mark::after {
    content: "";
    position: absolute; bottom: 4px; left: 50%; transform: translateX(-50%);
    width: 18px; height: 2px;
    background: linear-gradient(90deg, var(--good) 0%, var(--good) 33%, var(--warn) 33%, var(--warn) 66%, var(--bad) 66%, var(--bad) 100%);
    border-radius: 1px;
  }
  .brand-mark span {
    font-family: Georgia, serif; font-weight: 700; font-size: 22px;
    color: var(--text); margin-top: -2px;
  }
  .brand-name {
    font-family: Georgia, serif; font-size: 20px; font-weight: 600;
    letter-spacing: -0.01em;
  }
  .brand-tag {
    font-size: 11px; color: var(--muted);
    text-transform: uppercase; letter-spacing: 0.12em;
    margin-top: -2px;
  }
  .pill {
    font-size: 10px; padding: 5px 10px; border-radius: 999px;
    background: rgba(212,165,116,0.08); color: var(--gold);
    border: 1px solid rgba(212,165,116,0.2);
    text-transform: uppercase; letter-spacing: 0.1em; font-weight: 600;
  }

  /* Scan grid — three primary buttons */
  .scan-grid {
    display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px;
  }
  .scan-btn {
    position: relative;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    width: 100%; aspect-ratio: 0.95 / 1;
    background:
      radial-gradient(circle at 50% 35%, #3d2f22, #1f1812);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 22px;
    font-family: Georgia, serif; font-size: 17px; font-weight: 600;
    letter-spacing: -0.01em;
    cursor: pointer;
    overflow: hidden;
    transition: transform 0.15s, border-color 0.2s;
    -webkit-tap-highlight-color: transparent;
    padding: 8px;
  }
  .scan-btn::before {
    content: "";
    position: absolute; inset: 0;
    background: radial-gradient(circle at 50% 35%, rgba(212,165,116,0.12), transparent 60%);
    opacity: 0; transition: opacity 0.3s;
  }
  .scan-btn:hover::before, .scan-btn:focus::before { opacity: 1; }
  .scan-btn:active { transform: scale(0.985); border-color: var(--gold); }
  .scan-btn:disabled { opacity: 0.5; cursor: wait; }
  .scan-icon {
    width: 44px; height: 44px; border-radius: 50%;
    border: 1.5px solid var(--gold);
    display: flex; align-items: center; justify-content: center;
    font-size: 19px; margin-bottom: 8px;
    background: rgba(212,165,116,0.05);
    position: relative;
    color: var(--gold);
    animation: idleBreath 4s ease-in-out infinite;
  }
  .scan-icon svg { width: 22px; height: 22px; }
  .scan-icon::after {
    content: "";
    position: absolute; inset: -5px;
    border-radius: 50%; border: 1px solid rgba(212,165,116,0.15);
    animation: idleRing 4s ease-in-out infinite;
  }
  @keyframes idleBreath {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.04); }
  }
  @keyframes idleRing {
    0%, 100% { transform: scale(1); opacity: 0.4; }
    50% { transform: scale(1.08); opacity: 0.1; }
  }
  .scan-sub {
    font-family: -apple-system, sans-serif;
    font-size: 9px; font-weight: 400; color: var(--muted);
    margin-top: 3px; text-transform: uppercase; letter-spacing: 0.1em;
    text-align: center;
    line-height: 1.2;
  }

  /* Live barcode scanner modal */
  .bcm {
    position: fixed; inset: 0; z-index: 9999;
    background: #000;
  }
  .bcm[hidden] { display: none !important; }
  .bcm-video, #qrReader {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    background: #000;
  }
  /* html5-qrcode injects its own video element; force it to fill */
  #qrReader video {
    position: absolute !important;
    inset: 0 !important;
    width: 100% !important;
    height: 100% !important;
    object-fit: cover !important;
  }
  #qrReader > * { background: transparent !important; }
  #qrReader__dashboard, #qrReader__scan_region img { display: none !important; }
  .bcm-mask {
    position: absolute; inset: 0;
    background: rgba(0, 0, 0, 0.45);
  }
  .bcm-frame {
    position: absolute; left: 50%; top: 50%;
    transform: translate(-50%, -50%);
    width: min(78vw, 360px);
    aspect-ratio: 16/10;
    border: 2px solid var(--gold);
    border-radius: 18px;
    box-shadow:
      0 0 24px rgba(212,165,116,0.5),
      inset 0 0 0 1px rgba(212,165,116,0.2);
    animation: bcmPulse 1.6s ease-in-out infinite;
    pointer-events: none;
  }
  .bcm-frame::before, .bcm-frame::after {
    content: ""; position: absolute;
    width: 22px; height: 22px;
    border: 3px solid var(--gold);
  }
  .bcm-frame::before {
    top: -3px; left: -3px;
    border-right: none; border-bottom: none; border-radius: 18px 0 0 0;
  }
  .bcm-frame::after {
    bottom: -3px; right: -3px;
    border-left: none; border-top: none; border-radius: 0 0 18px 0;
  }
  .bcm-line {
    position: absolute; left: 0; right: 0; top: 0; height: 2px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    box-shadow: 0 0 10px var(--gold);
    animation: bcmScan 1.6s ease-in-out infinite;
  }
  @keyframes bcmPulse {
    0%, 100% { box-shadow: 0 0 24px rgba(212,165,116,0.4), inset 0 0 0 1px rgba(212,165,116,0.2); }
    50% { box-shadow: 0 0 36px rgba(212,165,116,0.7), inset 0 0 0 1px rgba(212,165,116,0.3); }
  }
  @keyframes bcmScan {
    0%, 100% { top: 0%; opacity: 0; }
    10% { opacity: 1; }
    90% { opacity: 1; }
    50% { top: 100%; }
  }
  .bcm-header {
    position: absolute; top: 0; left: 0; right: 0;
    padding: max(env(safe-area-inset-top), 14px) 16px 14px;
    display: flex; align-items: center; gap: 14px;
    background: linear-gradient(180deg, rgba(0,0,0,0.6), transparent);
  }
  .bcm-cancel {
    width: 36px; height: 36px; border-radius: 50%;
    background: rgba(0,0,0,0.5);
    border: 1px solid rgba(255,255,255,0.2);
    color: #fff; font-size: 16px; cursor: pointer;
    -webkit-backdrop-filter: blur(10px); backdrop-filter: blur(10px);
    -webkit-tap-highlight-color: transparent;
    display: flex; align-items: center; justify-content: center;
  }
  .bcm-title {
    color: #fff; font-size: 16px; font-weight: 600;
    font-family: Georgia, serif;
  }
  .bcm-status {
    position: absolute; left: 16px; right: 16px;
    bottom: max(env(safe-area-inset-bottom), 24px);
    text-align: center;
    color: #fff; font-size: 13px;
    padding: 12px 16px;
    background: rgba(0,0,0,0.55);
    -webkit-backdrop-filter: blur(10px); backdrop-filter: blur(10px);
    border-radius: 12px;
    letter-spacing: 0.04em;
  }
  .bcm-snap {
    position: absolute;
    left: 50%; transform: translateX(-50%);
    bottom: calc(max(env(safe-area-inset-bottom), 24px) + 56px);
    padding: 12px 22px;
    background: var(--gold); color: #14110d;
    border: none; border-radius: 999px;
    font-size: 13px; font-weight: 700;
    letter-spacing: 0.06em; text-transform: uppercase;
    cursor: pointer;
    box-shadow: 0 6px 20px rgba(212,165,116,0.5);
    -webkit-tap-highlight-color: transparent;
  }
  .bcm-snap:active { transform: translateX(-50%) scale(0.96); }

  /* Manual barcode entry fallback */
  .manual-entry {
    margin-top: 18px;
    padding: 18px;
    background: var(--card);
    border: 1px solid var(--border);
    border-left: 2px solid var(--gold);
    border-radius: 14px;
  }
  .manual-entry-title {
    font-family: Georgia, serif;
    font-size: 16px; font-weight: 600;
    color: var(--text);
    margin-bottom: 4px;
  }
  .manual-entry-help {
    font-size: 12px; color: var(--muted);
    margin-bottom: 12px; line-height: 1.5;
  }
  .manual-entry-row {
    display: flex; gap: 8px;
  }
  .manual-entry-row input {
    flex: 1;
    padding: 13px 14px;
    background: var(--bg-2);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 11px;
    font-size: 15px;
    font-family: -apple-system, monospace;
    letter-spacing: 0.06em;
    -webkit-appearance: none;
  }
  .manual-entry-row input:focus { outline: none; border-color: var(--gold); }
  .manual-entry-row button {
    padding: 13px 18px;
    background: var(--gold);
    color: #14110d;
    border: none;
    border-radius: 11px;
    font-size: 13px; font-weight: 700;
    letter-spacing: 0.04em; text-transform: uppercase;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .manual-entry-row button:active { opacity: 0.85; }

  /* Menu mode results */
  .menu-result {
    margin-top: 22px;
    animation: slideUp 0.4s cubic-bezier(0.2, 0.7, 0.2, 1);
  }
  .menu-header {
    margin-bottom: 14px;
  }
  .menu-type {
    font-family: Georgia, serif;
    font-size: 13px; color: var(--gold);
    text-transform: uppercase; letter-spacing: 0.12em;
    font-weight: 600;
  }
  .menu-section-h {
    font-family: Georgia, serif;
    font-size: 13px; font-weight: 600;
    letter-spacing: 0.14em; text-transform: uppercase;
    margin: 18px 0 10px;
    display: flex; align-items: center; gap: 8px;
  }
  .menu-section-h.good { color: var(--good); }
  .menu-section-h.bad { color: var(--bad); }
  .menu-section-h::before {
    content: ''; width: 18px; height: 1px;
    background: currentColor; opacity: 0.6;
  }
  .menu-section-h::after {
    content: ''; flex: 1; height: 1px;
    background: currentColor; opacity: 0.15;
  }
  .menu-rec {
    display: flex; gap: 12px;
    padding: 14px;
    background: var(--card); border: 1px solid var(--border);
    border-left: 2px solid var(--good);
    border-radius: 12px;
    margin-bottom: 8px;
    animation: flagIn 0.4s cubic-bezier(0.2, 0.7, 0.2, 1) backwards;
  }
  .menu-rec:nth-child(1) { animation-delay: 0.05s; }
  .menu-rec:nth-child(2) { animation-delay: 0.15s; }
  .menu-rec:nth-child(3) { animation-delay: 0.25s; }
  .rec-num {
    width: 28px; height: 28px; border-radius: 50%;
    background: rgba(95,166,124,0.15); color: var(--good);
    display: flex; align-items: center; justify-content: center;
    font-family: Georgia, serif; font-weight: 700; font-size: 15px;
    flex-shrink: 0;
  }
  .rec-body { flex: 1; min-width: 0; }
  .rec-dish {
    font-family: Georgia, serif;
    font-size: 16px; font-weight: 600; color: var(--text);
    margin-bottom: 4px;
  }
  .rec-why {
    font-size: 13px; line-height: 1.5; color: var(--text-2);
  }
  .rec-ask {
    margin-top: 8px;
    padding: 8px 11px;
    background: rgba(212,165,116,0.08);
    border-left: 2px solid var(--gold);
    border-radius: 6px;
    font-family: Georgia, serif; font-style: italic;
    font-size: 12px; color: var(--text-2);
    line-height: 1.4;
  }
  .rec-ask::before {
    content: 'Ask: '; font-style: normal; font-weight: 600;
    color: var(--gold); text-transform: uppercase;
    font-size: 10px; letter-spacing: 0.1em;
  }

  .menu-avoid-item {
    padding: 11px 14px;
    background: rgba(231,111,81,0.04);
    border: 1px solid rgba(231,111,81,0.2);
    border-left: 2px solid var(--bad);
    border-radius: 10px;
    margin-bottom: 6px;
    animation: flagIn 0.4s cubic-bezier(0.2, 0.7, 0.2, 1) backwards;
  }
  .menu-avoid-item:nth-child(1) { animation-delay: 0.3s; }
  .menu-avoid-item:nth-child(2) { animation-delay: 0.38s; }
  .menu-avoid-item:nth-child(3) { animation-delay: 0.46s; }
  .avoid-dish {
    font-weight: 600; font-size: 13px; color: var(--text);
    margin-bottom: 2px;
  }
  .avoid-why {
    font-size: 12px; color: var(--muted); line-height: 1.4;
  }

  .menu-summary {
    margin-top: 16px;
    padding: 14px 16px;
    background: var(--card-2);
    border-radius: 12px;
    border: 1px solid var(--border-soft);
    font-size: 13px; line-height: 1.55; color: var(--text-2);
  }
  .menu-summary::before {
    content: 'Overall';
    display: block;
    font-family: -apple-system, sans-serif;
    font-size: 10px; font-weight: 700;
    color: var(--muted);
    text-transform: uppercase; letter-spacing: 0.16em;
    margin-bottom: 6px;
  }

  /* Barcode result preview card */
  .bc-card {
    margin-top: 14px;
    padding: 14px 16px;
    border-radius: 14px;
    background: var(--card);
    border: 1px solid var(--border);
    display: flex; align-items: center; gap: 12px;
  }
  .bc-card-icon {
    width: 32px; height: 32px; border-radius: 8px;
    background: rgba(212,165,116,0.1);
    color: var(--gold);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .bc-card-text { flex: 1; min-width: 0; }
  .bc-card-name {
    font-size: 14px; font-weight: 600; color: var(--text);
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .bc-card-meta {
    font-size: 11px; color: var(--muted); margin-top: 2px;
    letter-spacing: 0.04em;
  }

  .upload-row { display: flex; gap: 8px; margin-top: 12px; }
  .upload-row button {
    flex: 1; padding: 13px; background: transparent;
    color: var(--text-2);
    border: 1px solid var(--border);
    border-radius: 12px; font-size: 13px; cursor: pointer;
    transition: border-color 0.15s, color 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .upload-row button:active { border-color: var(--gold); color: var(--text); }
  input[type="file"] { display: none; }

  /* Portion + note row */
  .opts {
    margin-top: 18px;
    padding: 14px;
    background: rgba(255,255,255,0.015);
    border: 1px solid var(--border-soft);
    border-radius: 14px;
  }
  .opts-label {
    font-size: 10px; font-weight: 600; letter-spacing: 0.16em;
    text-transform: uppercase; color: var(--muted);
    margin-bottom: 8px;
  }
  .portion-row {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px;
  }
  .portion-btn {
    padding: 8px 4px;
    background: transparent;
    color: var(--text-2);
    border: 1px solid var(--border);
    border-radius: 9px;
    font-size: 12px; font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .portion-btn:active { transform: scale(0.97); }
  .portion-btn.active {
    background: rgba(212,165,116,0.1);
    border-color: var(--gold);
    color: var(--text);
  }
  .note-toggle {
    display: block;
    margin-top: 12px;
    background: none; border: none; padding: 0;
    color: var(--muted); font-size: 12px;
    cursor: pointer; -webkit-tap-highlight-color: transparent;
  }
  .note-toggle:active { color: var(--gold); }
  .note-input {
    margin-top: 10px;
    width: 100%; padding: 11px 13px;
    background: var(--bg-2);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 10px;
    font-size: 13px; font-family: inherit;
    -webkit-tap-highlight-color: transparent;
  }
  .note-input:focus { outline: none; border-color: var(--gold); }
  .note-input::placeholder { color: var(--muted); }

  /* Source badge in result */
  .source-badge {
    display: inline-flex; align-items: center; gap: 4px;
    margin-left: auto;
    font-size: 10px; font-weight: 600; letter-spacing: 0.1em;
    text-transform: uppercase; color: var(--muted);
  }
  .source-badge::before {
    content: ""; width: 4px; height: 4px; border-radius: 50%;
    background: var(--gold);
  }

  /* Status */
  .status {
    margin-top: 18px; text-align: center;
    color: var(--muted); font-size: 13px; min-height: 18px;
    letter-spacing: 0.04em;
  }

  /* Preview with scan line */
  .preview {
    margin-top: 16px; border-radius: 18px; overflow: hidden;
    border: 1px solid var(--border); position: relative;
    background: var(--card);
  }
  .preview img { width: 100%; display: block; }
  .preview.loading::after {
    content: "";
    position: absolute; left: 0; right: 0; top: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    box-shadow: 0 0 14px var(--gold), 0 0 28px var(--gold);
    animation: scanLine 1.4s ease-in-out infinite;
  }
  .preview.loading::before {
    content: "";
    position: absolute; inset: 0;
    background: linear-gradient(180deg, transparent, rgba(212,165,116,0.04), transparent);
    background-size: 100% 200%;
    animation: scanGlow 1.4s ease-in-out infinite;
    pointer-events: none;
  }
  @keyframes scanLine {
    0% { transform: translateY(0%); opacity: 0; }
    10% { opacity: 1; }
    90% { opacity: 1; }
    100% { transform: translateY(60000%); opacity: 0; }
  }
  @keyframes scanGlow {
    0% { background-position: 0 -100%; }
    100% { background-position: 0 200%; }
  }

  /* Result card */
  .result-wrap { margin-top: 22px; animation: slideUp 0.4s cubic-bezier(0.2, 0.7, 0.2, 1); }
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(20px) scale(0.97); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }
  .result {
    padding: 24px 22px 22px;
    border-radius: 22px;
    background: var(--card);
    border: 1px solid var(--border);
    position: relative; overflow: hidden;
  }
  .result::before {
    content: "";
    position: absolute; left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--muted);
  }
  .result.v-good::before { background: var(--good); }
  .result.v-sometimes::before { background: var(--warn); }
  .result.v-avoid::before { background: var(--bad); }
  .result.v-unclear::before { background: var(--muted); }

  .verdict-row { display: flex; align-items: flex-start; gap: 16px; }
  .verdict-mark {

  @keyframes flagIn {

<script>
const HISTORY_KEY = 'foodScanner.history.v2';
const PORTION_KEY = 'foodScanner.portion';
const MAX_HISTORY = 25;
const $ = (id) => document.getElementById(id);

// Portion state
let currentPortion = localStorage.getItem(PORTION_KEY) || 'medium';

function setPortion(p) {
  currentPortion = p;
  localStorage.setItem(PORTION_KEY, p);
  document.querySelectorAll('.portion-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.portion === p);
  });
}

// ===== Post-photo barcode detection (html5-qrcode scanFile) =====
async function tryDetectBarcode(imageFile) {
  if (typeof Html5Qrcode === 'undefined' || !imageFile) return null;
  // Need a temp container
  const tempId = 'qrFileScanner_' + Date.now();
  const tempDiv = document.createElement('div');
  tempDiv.id = tempId;
  tempDiv.style.display = 'none';
  document.body.appendChild(tempDiv);
  let result = null;
  try {
    const tempScanner = new Html5Qrcode(tempId, { verbose: false });
    const text = await tempScanner.scanFile(imageFile, false);
    if (text) result = text.trim();
  } catch {
    // No barcode found — expected for non-barcoded images
  }
  try { tempDiv.remove(); } catch {}
  return result;
}

// ===== Open Food Facts lookup =====
async function offFetch(code) {
  const fields = 'product_name,brands,ingredients_text,allergens_tags,nova_group,nutriscore_grade,nutriments,serving_size,quantity';
  const url = `https://world.openfoodfacts.org/api/v2/product/${encodeURIComponent(code)}.json?fields=${fields}`;
  try {
    const r = await fetch(url);
    if (!r.ok) return null;
    const data = await r.json();
    if (data.status !== 1 || !data.product) return null;
    const p = data.product;
    if (!p.ingredients_text && !p.product_name) return null;
    return {
      barcode: code,
      name: p.product_name || '',
      brand: p.brands || '',
      ingredients: p.ingredients_text || '',
      allergens: (p.allergens_tags || []).map(t => t.replace(/^en:/, '')).join(', '),
      nova_group: p.nova_group || null,
      nutriscore: p.nutriscore_grade || null,
      nutriments: p.nutriments || null,
      serving_size: p.serving_size || '',
      quantity: p.quantity || '',
    };
  } catch {
    return null;
  }
}

async function lookupBarcode(code) {
  // Try the code as-is first
  let result = await offFetch(code);
  if (result) return result;

  // Try barcode-format variants (UPC-A is 12 digits, EAN-13 is 13 with a
  // leading 0; OFF stores both forms inconsistently)
  if (code.length === 12) {
    result = await offFetch('0' + code);
    if (result) return result;
  } else if (code.length === 13 && code.startsWith('0')) {
    result = await offFetch(code.slice(1));
    if (result) return result;
  }
  // EAN-8 → no useful variant to try

  return null;
}

// ===== Compress image. Also returns the source image element so we can run
// barcode detection on the original-resolution image (better detection rate).
async function compressImage(file, maxDim = 1280, quality = 0.78) {
  const dataUrl = await new Promise((resolve, reject) => {
    const r = new FileReader();
    r.onload = () => resolve(r.result);
    r.onerror = reject;
    r.readAsDataURL(file);
  });
  const img = await new Promise((resolve, reject) => {
    const i = new Image();
    i.onload = () => resolve(i);
    i.onerror = reject;
    i.src = dataUrl;
  });
  const ratio = Math.min(1, maxDim / Math.max(img.width, img.height));
  const w = Math.round(img.width * ratio);
  const h = Math.round(img.height * ratio);
  const canvas = document.createElement('canvas');
  canvas.width = w; canvas.height = h;
  const ctx = canvas.getContext('2d');
  ctx.drawImage(img, 0, 0, w, h);
  return { dataUrl: canvas.toDataURL('image/jpeg', quality), sourceImage: img };
}
function dataUrlToParts(dataUrl) {
  const m = dataUrl.match(/^data:([^;]+);base64,(.*)$/);
  if (!m) throw new Error('Invalid data URL');
  return { mime: m[1], base64: m[2] };
}
function escape(s) {
  return String(s).replace(/[&<>"']/g, c => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
  }[c]));
}

// ===== Render verdict =====
function renderResult(r) {
  const v = (r.verdict || 'unclear').toLowerCase();
  const cls = `v-${['good','sometimes','avoid','unclear'].includes(v) ? v : 'unclear'}`;

  const marks = { good: '✓', sometimes: '~', avoid: '✕', unclear: '?' };
  const labels = { good: 'Good for you', sometimes: 'Sometimes', avoid: 'Avoid', unclear: 'Unclear' };

  const procLabels = {
    whole: 'Whole food',
    minimal: 'Minimally processed',
    processed: 'Processed',
    ultra: 'Ultra-processed',
    unknown: '',
  };
  const proc = (r.processing || 'unknown').toLowerCase();
  const procLabel = procLabels[proc] ?? '';
  const procChipHtml = procLabel
    ? `<span class="proc-chip proc-${proc}">${procLabel}</span>`
    : '';

  const flagsHtml = (r.flags || []).map(f => {
    const lvl = (f.level || 'yellow').toLowerCase();
    return `<div class="flag flag-${lvl}">
      <div class="flag-dot"></div>
      <div><div class="flag-name">${escape(f.ingredient || '')}</div><div class="flag-why">${escape(f.why || '')}</div></div>
    </div>`;
  }).join('');

  const altHtml = r.alternative
    ? `<div class="alternative"><span class="alternative-label">Suggestion</span>${escape(r.alternative)}</div>`
    : '';

  let caloriesHtml = '';
  const c = r.calories;
  if (c && c.amount != null && c.confidence !== 'unknown') {
    const prefix = c.confidence === 'estimate' ? '≈' : '';
    const confLabel = c.confidence === 'estimate' ? 'Estimated' : 'From label';
    caloriesHtml = `
      <div class="calories">
        <div>
          <div class="cal-value">${prefix}${escape(String(c.amount))}<span class="cal-unit"> kcal</span></div>
          <div class="cal-confidence">${confLabel}</div>
        </div>
        <div class="cal-per">${escape(c.per || '')}</div>
      </div>`;
  }

  const sourceBadge = r._source === 'barcode'
    ? `<span class="source-badge">Via barcode</span>` : '';

  $('result').innerHTML = `
    <div class="result-wrap">
      <div class="result ${cls}">
        <div class="verdict-row">
          <div class="verdict-mark">${marks[v] || '?'}</div>
          <div class="verdict-text">
            <div class="verdict-meta">
              <span class="verdict-label">${labels[v] || 'Unclear'}</span>
              ${procChipHtml}
              ${sourceBadge}
            </div>
            <div class="headline">${escape(r.headline || '')}</div>
          </div>
        </div>
        ${caloriesHtml}
        ${r.summary ? `<div class="summary">${escape(r.summary)}</div>` : ''}
        ${flagsHtml ? `<div class="flags">${flagsHtml}</div>` : ''}
        ${altHtml}
      </div>
    </div>
  `;
}

// ===== Render menu mode result =====
function renderMenuResult(r) {
  const recs = Array.isArray(r.recommendations) ? r.recommendations : [];
  const avoid = Array.isArray(r.avoid) ? r.avoid : [];

  const recsHtml = recs.length
    ? recs.map(rec => `
      <div class="menu-rec">
        <div class="rec-num">${escape(String(rec.rank || ''))}</div>
        <div class="rec-body">
          <div class="rec-dish">${escape(rec.dish || '')}</div>
          <div class="rec-why">${escape(rec.why || '')}</div>
          ${rec.ask_waiter ? `<div class="rec-ask">${escape(rec.ask_waiter)}</div>` : ''}
        </div>
      </div>`).join('')
    : '';

  const avoidHtml = avoid.length
    ? avoid.map(a => `
      <div class="menu-avoid-item">
        <div class="avoid-dish">${escape(a.dish || '')}</div>
        <div class="avoid-why">${escape(a.why || '')}</div>
      </div>`).join('')
    : '';

  $('result').innerHTML = `
    <div class="menu-result">
      ${r.restaurant_type ? `<div class="menu-header"><div class="menu-type">${escape(r.restaurant_type)}</div></div>` : ''}
      ${recsHtml ? `<div class="menu-section-h good">Best picks</div>${recsHtml}` : ''}
      ${avoidHtml ? `<div class="menu-section-h bad">Skip these</div>${avoidHtml}` : ''}
      ${r.summary ? `<div class="menu-summary">${escape(r.summary)}</div>` : ''}
    </div>
  `;
}

// ===== History =====
function loadHistory() {
  try { return JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]'); }
  catch { return []; }
}
function saveHistory(arr) {
  localStorage.setItem(HISTORY_KEY, JSON.stringify(arr.slice(0, MAX_HISTORY)));
}
function addToHistory(result) {
  const hist = loadHistory();
  const cal = result.calories;
  hist.unshift({
    t: Date.now(),
    verdict: result.verdict || 'unclear',
    processing: result.processing || 'unknown',
    headline: result.headline || '',
    cal: (cal && cal.amount != null && cal.confidence !== 'unknown')
      ? { amount: cal.amount, confidence: cal.confidence }
      : null,
  });
  saveHistory(hist);
  renderHistory();
}
function renderHistory() {
  const hist = loadHistory();
  if (!hist.length) { $('historyWrap').style.display = 'none'; return; }
  $('historyWrap').style.display = 'block';
  const procShort = { whole: 'Whole', minimal: 'Minimal', processed: 'Processed', ultra: 'Ultra-proc' };
  $('historyList').innerHTML = hist.map(h => {
    const procTag = h.processing && procShort[h.processing]
      ? `<span class="history-proc proc-${h.processing}">${procShort[h.processing]}</span>` : '';
    const calTag = h.cal && h.cal.amount != null
      ? `<span class="history-cal">${h.cal.confidence === 'estimate' ? '≈' : ''}${h.cal.amount} kcal</span>`
      : '';
    return `<div class="history-row">
      <div class="history-dot ${h.verdict}"></div>
      <div class="history-text">
        <div class="history-headline">${escape(h.headline)}</div>
        <div class="history-time">${relTime(h.t)}${procTag ? ' · ' + procTag : ''}${calTag ? ' · ' + calTag : ''}</div>
      </div>
    </div>`;
  }).join('');
}
function relTime(t) {
  const d = (Date.now() - t) / 1000;
  if (d < 60) return 'just now';
  if (d < 3600) return Math.round(d / 60) + ' min ago';
  if (d < 86400) return Math.round(d / 3600) + ' h ago';
  return new Date(t).toLocaleDateString('en-GB', { day: '2-digit', month: 'short' });
}

// ===== Robust file decode =====
// Loads an image with EXIF rotation respected (iOS photos often need this).
async function loadImageBitmap(file) {
  if (window.createImageBitmap) {
    try {
      return await createImageBitmap(file, { imageOrientation: 'from-image' });
    } catch {}
  }
  // Fallback: regular Image element (no EXIF rotation, but at least loads)
  const dataUrl = await new Promise((resolve, reject) => {
    const r = new FileReader();
    r.onload = () => resolve(r.result);
    r.onerror = reject;
    r.readAsDataURL(file);
  });
  return await new Promise((resolve, reject) => {
    const i = new Image();
    i.onload = () => resolve(i);
    i.onerror = reject;
    i.src = dataUrl;
  });
}

function canvasToFile(canvas, name = 'r.jpg') {
  return new Promise((resolve) => {
    canvas.toBlob((blob) => {
      if (!blob) { resolve(null); return; }
      resolve(new File([blob], name, { type: 'image/jpeg' }));
    }, 'image/jpeg', 0.92);
  });
}

async function downsizeToFile(file, maxDim) {
  const img = await loadImageBitmap(file);
  const w0 = img.width, h0 = img.height;
  const ratio = Math.min(1, maxDim / Math.max(w0, h0));
  const w = Math.round(w0 * ratio);
  const h = Math.round(h0 * ratio);
  const canvas = document.createElement('canvas');
  canvas.width = w; canvas.height = h;
  canvas.getContext('2d').drawImage(img, 0, 0, w, h);
  return await canvasToFile(canvas, 'd.jpg');
}

async function rotateToFile(file, degrees) {
  const img = await loadImageBitmap(file);
  const w0 = img.width, h0 = img.height;
  const canvas = document.createElement('canvas');
  if (degrees === 90 || degrees === 270) {
    canvas.width = h0; canvas.height = w0;
  } else {
    canvas.width = w0; canvas.height = h0;
  }
  const ctx = canvas.getContext('2d');
  ctx.translate(canvas.width / 2, canvas.height / 2);
  ctx.rotate((degrees * Math.PI) / 180);
  ctx.drawImage(img, -w0 / 2, -h0 / 2);
  return await canvasToFile(canvas, `r${degrees}.jpg`);
}

async function robustDecode(file, onAttempt) {
  // Try in many forms — different libraries fail on different image conditions.
  // Note: downsize functions already apply EXIF rotation via createImageBitmap.
  const tries = [];
  try { tries.push({ name: 'normalised', file: await downsizeToFile(file, 2000) }); } catch {}
  try { tries.push({ name: '1280px', file: await downsizeToFile(file, 1280) }); } catch {}
  try { tries.push({ name: '800px', file: await downsizeToFile(file, 800) }); } catch {}
  try { tries.push({ name: '90°', file: await rotateToFile(file, 90) }); } catch {}
  try { tries.push({ name: '270°', file: await rotateToFile(file, 270) }); } catch {}
  tries.push({ name: 'original', file });

  for (const t of tries) {
    if (!t.file) continue;
    if (onAttempt) onAttempt(t.name);
    const code = await tryDetectBarcode(t.file);
    if (code) return code;
  }
  return null;
}

// ===== Menu mode =====
// User photographs a full restaurant menu. App returns top 3 picks +
// top 3 to avoid based on the user's health profile.
async function handleMenuShot(file) {
  if (!file) return;
  $('error').innerHTML = '';
  $('result').innerHTML = '';
  $('barcodeBtn').disabled = true;
  $('cameraBtn').disabled = true;
  $('menuBtn').disabled = true;

  // Show the captured menu photo as preview
  const previewUrl = URL.createObjectURL(file);
  $('preview').innerHTML = `<div class="preview"><img src="${previewUrl}"></div>`;

  $('status').innerHTML = '<span class="spinner"></span>Reading the menu';

  try {
    const compressed = await compressImage(file, 1600, 0.85);
    const { dataUrl } = compressed;
    const { mime, base64 } = dataUrlToParts(dataUrl);
    const noteVal = ($('noteInput').value || '').trim();

    const payload = {
      mode: 'menu',
      image: base64,
      mime,
      note: noteVal,
    };

    $('status').innerHTML = '<span class="spinner"></span>Picking the best 3 dishes for you';

    const resp = await fetch('/api/scan', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });

    if (!resp.ok) {
      const t = await resp.text();
      showError('Server error (' + resp.status + '): ' + t.slice(0, 200));
      return;
    }

    const result = await resp.json();
    if (result.error) { showError(result.error); return; }

    renderMenuResult(result);
    // Don't add menu scans to history (they're not single-product verdicts)
  } catch (e) {
    showError('Error: ' + (e?.message || e?.name || String(e)));
  } finally {
    $('barcodeBtn').disabled = false;
    $('cameraBtn').disabled = false;
    $('menuBtn').disabled = false;
    $('status').innerHTML = '';
  }
}

// Sends the photo straight to Claude for visual analysis when OFF doesn't
// have the product. Reuses the standard /api/scan vision path.
async function analyzePhotoDirectly(file) {
  $('error').innerHTML = '';
  $('barcodeBtn').disabled = true;
  $('cameraBtn').disabled = true;

  try {
    const compressed = await compressImage(file);
    const { dataUrl } = compressed;
    const { mime, base64 } = dataUrlToParts(dataUrl);
    const noteVal = ($('noteInput').value || '').trim();
    const note = noteVal
      ? noteVal + ' (barcode lookup failed; identify product visually)'
      : 'Barcode lookup failed for this product. Identify what it is from the photo and verdict accordingly.';
    const payload = { portion: currentPortion, note, image: base64, mime };

    $('status').innerHTML = '<span class="spinner"></span>Analysing the photo with Claude';

    const resp = await fetch('/api/scan', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });

    if (!resp.ok) {
      const t = await resp.text();
      showError('Server error (' + resp.status + '): ' + t.slice(0, 200));
      return;
    }

    const result = await resp.json();
    if (result.error) { showError(result.error); return; }

    renderResult(result);
    addToHistory(result);
  } catch (e) {
    showError('Error: ' + (e?.message || e?.name || String(e)));
  } finally {
    $('barcodeBtn').disabled = false;
    $('cameraBtn').disabled = false;
    $('status').innerHTML = '';
  }
}

// ===== Barcode-shot flow =====
// User taps "Barcode" button → iOS opens native camera → user snaps the
// barcode → we decode the resulting image.
// Ask Claude (Haiku) to read the barcode digits from a photo when local
// decoders fail. Cheap (~$0.001), fast, very accurate at OCR.
async function ocrBarcodeWithClaude(file) {
  try {
    const compressed = await compressImage(file);
    const { dataUrl } = compressed;
    const { mime, base64 } = dataUrlToParts(dataUrl);
    const resp = await fetch('/api/ocr-barcode', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ image: base64, mime }),
    });
    if (!resp.ok) return null;
    const data = await resp.json();
    return data.code || null;
  } catch {
    return null;
  }
}

async function handleBarcodeShot(file) {
  if (!file) return;
  $('error').innerHTML = '';
  $('result').innerHTML = '';
  $('barcodeBtn').disabled = true;
  $('cameraBtn').disabled = true;

  // Show the captured photo immediately so the user can see what was shot
  const previewUrl = URL.createObjectURL(file);
  $('preview').innerHTML = `<div class="preview"><img src="${previewUrl}"></div>`;

  $('status').innerHTML = '<span class="spinner"></span>Reading barcode from photo';

  let code = null;
  try {
    code = await robustDecode(file, (attemptName) => {
      $('status').innerHTML = `<span class="spinner"></span>Trying ${attemptName}…`;
    });
  } catch {}

  // Local decoders couldn't read it — let Claude (Haiku, cheap) try the OCR
  if (!code) {
    $('status').innerHTML = '<span class="spinner"></span>Asking Claude to read the digits…';
    code = await ocrBarcodeWithClaude(file);
  }

  $('barcodeBtn').disabled = false;
  $('cameraBtn').disabled = false;
  $('status').innerHTML = '';

  if (!code) {
    // Truly unreadable — last-resort manual entry
    showManualBarcodeEntry(file);
    return;
  }

  await processBarcodeCode(code, file);
}

function showManualBarcodeEntry(originalFile) {
  $('result').innerHTML = `
    <div class="manual-entry">
      <div class="manual-entry-title">Couldn't read it automatically</div>
      <div class="manual-entry-help">Look at the photo above and type the digits printed below the barcode (usually 8-13 numbers).</div>
      <div class="manual-entry-row">
        <input id="manualBarcode" type="text" inputmode="numeric" pattern="[0-9]*" autocomplete="off" maxlength="14" placeholder="e.g. 5012345678901">
        <button id="manualLookupBtn">Look up</button>
      </div>
    </div>
  `;
  const input = $('manualBarcode');
  setTimeout(() => input.focus(), 50);

  const submit = () => {
    const code = (input.value || '').replace(/\D/g, '').trim();
    if (code.length < 6) {
      input.style.borderColor = 'var(--bad)';
      setTimeout(() => { input.style.borderColor = ''; }, 1500);
      return;
    }
    $('result').innerHTML = '';
    processBarcodeCode(code, originalFile);
  };

  $('manualLookupBtn').addEventListener('click', submit);
  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') submit();
  });
}

async function processBarcodeCode(code, photoFallback) {
  $('error').innerHTML = '';
  $('barcodeBtn').disabled = true;
  $('cameraBtn').disabled = true;
  $('status').innerHTML = '<span class="spinner"></span>Looking up product (' + escape(code) + ')';

  try {
    const productData = await lookupBarcode(code);
    if (!productData) {
      // Auto-fall-back to Claude vision on the original photo if we have one.
      // OFF coverage is good but not exhaustive, especially for store-brands,
      // multipacks, and regional SKUs.
      if (photoFallback) {
        $('status').innerHTML = '<span class="spinner"></span>Not in database · analysing your photo with Claude';
        $('barcodeBtn').disabled = false;
        $('cameraBtn').disabled = false;
        await analyzePhotoDirectly(photoFallback);
        return;
      }
      showError('Product ' + code + ' not in Open Food Facts. Double-check the digits, or use the Photo button to scan the label directly.');
      return;
    }

    $('preview').innerHTML = `
      <div class="bc-card">
        <div class="bc-card-icon">
          <svg viewBox="0 0 24 24" fill="currentColor" width="18" height="18"><rect x="2" y="4" width="2" height="16"/><rect x="5" y="4" width="1" height="16"/><rect x="7" y="4" width="3" height="16"/><rect x="11" y="4" width="1" height="16"/><rect x="13" y="4" width="2" height="16"/><rect x="16" y="4" width="3" height="16"/><rect x="20" y="4" width="2" height="16"/></svg>
        </div>
        <div class="bc-card-text">
          <div class="bc-card-name">${escape(productData.name || 'Unknown product')}</div>
          <div class="bc-card-meta">${productData.brand ? escape(productData.brand) + ' · ' : ''}${escape(code)}</div>
        </div>
      </div>`;

    $('status').innerHTML = '<span class="spinner"></span>Reading the ingredients';

    const noteVal = ($('noteInput').value || '').trim();
    const payload = { portion: currentPortion, note: noteVal, productData };

    const resp = await fetch('/api/scan', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });

    if (!resp.ok) {
      const t = await resp.text();
      showError('Server error (' + resp.status + '): ' + t.slice(0, 200));
      return;
    }

    const result = await resp.json();
    if (result.error) { showError(result.error); return; }

    renderResult(result);
    addToHistory(result);
  } catch (e) {
    showError('Error: ' + (e?.message || e?.name || String(e)));
  } finally {
    $('barcodeBtn').disabled = false;
    $('cameraBtn').disabled = false;
    $('status').innerHTML = '';
  }
}

// ===== Scan flow =====
async function handleFile(file) {
  if (!file) return;
  $('error').innerHTML = '';
  $('result').innerHTML = '';
  $('barcodeBtn').disabled = true;
  $('cameraBtn').disabled = true;
  $('status').innerHTML = '<span class="spinner"></span>Compressing image';

  try {
    const compressed = await compressImage(file);
    const { dataUrl } = compressed;
    $('preview').innerHTML = `<div class="preview loading"><img src="${dataUrl}"></div>`;
    const { mime, base64 } = dataUrlToParts(dataUrl);
    const noteVal = ($('noteInput').value || '').trim();

    $('status').innerHTML = '<span class="spinner"></span>Looking for a barcode';
    let productData = null;
    const barcode = await tryDetectBarcode(file);
    if (barcode) {
      $('status').innerHTML = '<span class="spinner"></span>Barcode found · looking up product';
      productData = await lookupBarcode(barcode);
    }

    const payload = { portion: currentPortion, note: noteVal };
    if (productData) {
      payload.productData = productData;
    } else {
      payload.image = base64;
      payload.mime = mime;
    }

    $('status').innerHTML = productData
      ? '<span class="spinner"></span>Reading ' + (productData.name || 'product')
      : '<span class="spinner"></span>Reading the ingredients';

    const resp = await fetch('/api/scan', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });

    if (!resp.ok) {
      const t = await resp.text();
      showError('Server error (' + resp.status + '): ' + t.slice(0, 200));
      return;
    }

    const result = await resp.json();
    if (result.error) { showError(result.error); return; }

    renderResult(result);
    addToHistory(result);
  } catch (e) {
    showError('Error: ' + (e?.message || e?.name || String(e)));
  } finally {
    $('barcodeBtn').disabled = false;
    $('cameraBtn').disabled = false;
    $('status').innerHTML = '';
    document.querySelector('.preview')?.classList.remove('loading');
  }
}

function showError(msg) {
  $('error').innerHTML = `<div class="error">${escape(msg)}</div>`;
}


// ===== Wire up =====
// IMPORTANT: reset input value after every change so iOS re-fires the event
// next time even if it thinks "the same" file was picked.
function bindFileInput(inputId, handler) {
  $(inputId).addEventListener('change', (e) => {
    const file = e.target.files[0];
    e.target.value = ''; // reset so next selection fires change again on iOS
    if (file) handler(file);
  });
}

// ===== Live barcode scanner =====
let html5Qr = null;
let bcmActive = false;
function setStep(text) { const el = $('bcmStatus'); if (el) el.textContent = text; }

async function openBarcodeScanner() {
  // If library isn't available, go straight to one-shot photo
  if (typeof Html5Qrcode === 'undefined') {
    $('barcodeInput').click();
    return;
  }
  if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
    $('barcodeInput').click();
    return;
  }

  $('error').innerHTML = '';
  $('barcodeModal').hidden = false;
  setStep('Resetting…');

  // Aggressive cleanup of any previous scanner state
  bcmActive = false;
  if (html5Qr) {
    try {
      const state = html5Qr.getState && html5Qr.getState();
      if (state === 2 || state === 3) await html5Qr.stop();
    } catch {}
    try { html5Qr.clear(); } catch {}
    html5Qr = null;
  }
  document.querySelectorAll('video').forEach((v) => {
    try {
      if (v.srcObject) {
        v.srcObject.getTracks().forEach((t) => t.stop());
        v.srcObject = null;
      }
    } catch {}
  });
  const container = $('qrReader');
  if (container) container.innerHTML = '';
  await new Promise((r) => setTimeout(r, 300));

  bcmActive = true;
  setStep('Starting camera…');

  try {
    html5Qr = new Html5Qrcode('qrReader', {
      verbose: false,
      formatsToSupport: [
        Html5QrcodeSupportedFormats.EAN_13,
        Html5QrcodeSupportedFormats.EAN_8,
        Html5QrcodeSupportedFormats.UPC_A,
        Html5QrcodeSupportedFormats.UPC_E,
        Html5QrcodeSupportedFormats.CODE_128,
        Html5QrcodeSupportedFormats.CODE_39,
        Html5QrcodeSupportedFormats.CODE_93,
        Html5QrcodeSupportedFormats.ITF,
      ],
    });
  } catch (e) {
    closeBarcodeModal();
    showError('Setup error: ' + (e?.message || e?.name));
    return;
  }

  const qrboxFn = (vw) => {
    const w = Math.min(Math.round(vw * 0.78), 360);
    return { width: w, height: Math.round(w * 0.5) };
  };

  let attempts = 0;
  const startTime = Date.now();

  try {
    await html5Qr.start(
      { facingMode: 'environment' },
      {
        fps: 15,
        qrbox: qrboxFn,
        disableFlip: true,
        videoConstraints: {
          facingMode: { ideal: 'environment' },
          width: { ideal: 1920 },
          height: { ideal: 1080 },
        },
      },
      async (decodedText) => {
        if (!bcmActive) return;
        const code = (decodedText || '').trim();
        if (!code) return;
        bcmActive = false;
        if (navigator.vibrate) navigator.vibrate(80);
        setStep('Got it: ' + code);
        await stopBarcodeScanner();
        $('barcodeModal').hidden = true;
        // Live scan has no original file to fall back to, pass null
        await processBarcodeCode(code, null);
      },
      () => {
        if (!bcmActive) return;
        attempts++;
        if (attempts % 15 === 0) {
          const sec = Math.round((Date.now() - startTime) / 1000);
          setStep(`Scanning · ${sec}s · or tap "Take picture instead"`);
        }
      }
    );
    setStep('Point at a barcode');
  } catch (e) {
    closeBarcodeModal();
    const msg = e?.message || e?.name || String(e);
    if (/permission|denied|notallowed/i.test(msg)) {
      showError('Camera permission denied. iOS: Settings → Safari → Camera → Allow.');
    } else {
      showError('Camera error: ' + msg + ' — using picture mode instead.');
      $('barcodeInput').click();
    }
  }
}

async function stopBarcodeScanner() {
  bcmActive = false;
  if (html5Qr) {
    try {
      const state = html5Qr.getState && html5Qr.getState();
      if (state === 2 || state === 3) await html5Qr.stop();
    } catch {}
    try { html5Qr.clear(); } catch {}
    html5Qr = null;
  }
  document.querySelectorAll('video').forEach((v) => {
    try {
      if (v.srcObject) {
        v.srcObject.getTracks().forEach((t) => t.stop());
        v.srcObject = null;
      }
    } catch {}
  });
}

async function closeBarcodeModal() {
  await stopBarcodeScanner();
  $('barcodeModal').hidden = true;
  const c = $('qrReader');
  if (c) c.innerHTML = '';
}

// "Take picture instead" — closes live mode, triggers iOS native camera shot
async function fallbackToPicture() {
  await closeBarcodeModal();
  // Small delay so iOS releases camera before file input opens it
  setTimeout(() => $('barcodeInput').click(), 300);
}

$('barcodeBtn').addEventListener('click', openBarcodeScanner);
$('bcmCancel').addEventListener('click', closeBarcodeModal);
$('bcmSnap').addEventListener('click', fallbackToPicture);
$('cameraBtn').addEventListener('click', () => $('cameraInput').click());
$('menuBtn').addEventListener('click', () => $('menuInput').click());
$('uploadBtn').addEventListener('click', () => $('uploadInput').click());

bindFileInput('barcodeInput', handleBarcodeShot);
bindFileInput('cameraInput', handleFile);
bindFileInput('menuInput', handleMenuShot);
bindFileInput('uploadInput', handleFile);
$('clearBtn').addEventListener('click', () => {
  if (confirm('Clear scan history?')) { saveHistory([]); renderHistory(); }
});

// Portion buttons
document.querySelectorAll('.portion-btn').forEach(btn => {
  btn.addEventListener('click', () => setPortion(btn.dataset.portion));
});
setPortion(currentPortion); // restore from localStorage

// Note toggle
$('noteToggle').addEventListener('click', () => {
  const input = $('noteInput');
  const hidden = input.hidden;
  input.hidden = !hidden;
  if (!hidden) {
    input.value = '';
    $('noteToggle').textContent = '+ Add context (optional)';
  } else {
    $('noteToggle').textContent = '− Hide context';
    setTimeout(() => input.focus(), 50);
  }
});

renderHistory();
