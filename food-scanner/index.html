<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0f172a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Scanner">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><rect width='180' height='180' rx='40' fill='%230f172a'/><text x='90' y='128' font-size='110' text-anchor='middle' font-family='-apple-system'>🛒</text></svg>">
<link rel="icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><text y='52' font-size='52'>🛒</text></svg>">
<title>Food scanner</title>
<style>
  *, *::before, *::after { box-sizing: border-box; }
  :root {
    --bg: #0f172a;
    --card: #1e293b;
    --border: #334155;
    --text: #f8fafc;
    --muted: #94a3b8;
    --accent: #7c3aed;
    --good: #10b981;
    --warn: #f59e0b;
    --bad: #ef4444;
  }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    min-height: 100vh;
    min-height: 100dvh;
    -webkit-font-smoothing: antialiased;
    overscroll-behavior-y: contain;
  }
  .app {
    max-width: 540px;
    margin: 0 auto;
    padding: max(env(safe-area-inset-top), 16px) 16px max(env(safe-area-inset-bottom), 16px);
    min-height: 100dvh;
    display: flex; flex-direction: column;
  }
  header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 24px;
  }
  h1 {
    font-size: 20px; font-weight: 600; margin: 0;
    letter-spacing: -0.01em;
  }
  .pill {
    font-size: 11px; padding: 4px 10px; border-radius: 999px;
    background: var(--card); color: var(--muted);
    border: 1px solid var(--border);
  }
  .scan-btn {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    width: 100%; aspect-ratio: 1.6 / 1;
    background: linear-gradient(135deg, #7c3aed, #4f46e5);
    color: white; border: none; border-radius: 24px;
    font-size: 22px; font-weight: 600;
    cursor: pointer;
    box-shadow: 0 10px 40px rgba(124,58,237,.3);
    transition: transform 0.15s, box-shadow 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .scan-btn:active { transform: scale(0.98); box-shadow: 0 6px 20px rgba(124,58,237,.4); }
  .scan-btn:disabled { opacity: 0.5; cursor: wait; }
  .scan-btn .icon { font-size: 56px; margin-bottom: 12px; }
  .scan-btn .sub { font-size: 13px; font-weight: 400; opacity: 0.8; margin-top: 6px; }
  .upload-row {
    display: flex; gap: 8px; margin-top: 12px;
  }
  .upload-row button {
    flex: 1; padding: 12px; background: var(--card); color: var(--text);
    border: 1px solid var(--border); border-radius: 12px;
    font-size: 14px; cursor: pointer;
  }
  input[type="file"] { display: none; }

  .status {
    margin-top: 20px; text-align: center; color: var(--muted); font-size: 14px; min-height: 20px;
  }
  .preview {
    margin-top: 16px; border-radius: 16px; overflow: hidden;
    border: 1px solid var(--border);
  }
  .preview img { width: 100%; display: block; }

  .result {
    margin-top: 20px; padding: 20px; border-radius: 20px;
    background: var(--card); border: 1px solid var(--border);
    animation: slideUp 0.3s ease-out;
  }
  @keyframes slideUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
  .verdict {
    display: flex; align-items: center; gap: 12px; margin-bottom: 12px;
  }
  .verdict-dot {
    width: 56px; height: 56px; border-radius: 50%; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 30px;
  }
  .verdict-text { flex: 1; }
  .verdict-text .label {
    font-size: 12px; text-transform: uppercase; letter-spacing: 0.08em;
    font-weight: 600; color: var(--muted);
  }
  .verdict-text .headline {
    font-size: 17px; font-weight: 600; line-height: 1.3; margin-top: 2px;
  }
  .v-good .verdict-dot { background: rgba(16,185,129,.15); color: var(--good); }
  .v-good .label { color: var(--good); }
  .v-sometimes .verdict-dot { background: rgba(245,158,11,.15); color: var(--warn); }
  .v-sometimes .label { color: var(--warn); }
  .v-avoid .verdict-dot { background: rgba(239,68,68,.15); color: var(--bad); }
  .v-avoid .label { color: var(--bad); }
  .v-unclear .verdict-dot { background: rgba(148,163,184,.15); color: var(--muted); }

  .summary {
    margin-top: 6px; font-size: 14px; line-height: 1.5; color: #cbd5e1;
  }
  .flags { margin-top: 14px; display: flex; flex-direction: column; gap: 8px; }
  .flag {
    display: flex; gap: 10px; align-items: flex-start;
    padding: 10px 12px; border-radius: 10px;
    background: rgba(255,255,255,.03);
    font-size: 13px; line-height: 1.4;
  }
  .flag-dot { width: 8px; height: 8px; border-radius: 50%; margin-top: 6px; flex-shrink: 0; }
  .flag-red .flag-dot { background: var(--bad); }
  .flag-yellow .flag-dot { background: var(--warn); }
  .flag-green .flag-dot { background: var(--good); }
  .flag .name { font-weight: 600; }
  .flag .why { color: var(--muted); }
  .alternative {
    margin-top: 14px; padding: 10px 12px; border-radius: 10px;
    background: rgba(124,58,237,.1); border: 1px solid rgba(124,58,237,.3);
    font-size: 13px; line-height: 1.5;
  }
  .alternative .label { font-weight: 600; color: #a78bfa; margin-right: 6px; }

  .history { margin-top: 28px; }
  .history h2 {
    font-size: 13px; text-transform: uppercase; letter-spacing: 0.08em;
    color: var(--muted); margin: 0 0 10px;
  }
  .history-row {
    display: flex; gap: 10px; align-items: center;
    padding: 10px 12px; border-radius: 10px; background: var(--card);
    border: 1px solid var(--border); margin-bottom: 6px;
    font-size: 13px;
  }
  .history-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .history-dot.good { background: var(--good); }
  .history-dot.sometimes { background: var(--warn); }
  .history-dot.avoid { background: var(--bad); }
  .history-dot.unclear { background: var(--muted); }
  .history-text { flex: 1; min-width: 0; }
  .history-headline {
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .history-time { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .clear-btn {
    background: none; border: none; color: var(--muted); font-size: 12px;
    cursor: pointer; padding: 0;
  }

  .spinner {
    width: 20px; height: 20px; border-radius: 50%;
    border: 2px solid rgba(255,255,255,.2); border-top-color: white;
    animation: spin 0.8s linear infinite;
    display: inline-block; vertical-align: middle; margin-right: 8px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .error {
    margin-top: 16px; padding: 12px 14px; border-radius: 10px;
    background: rgba(239,68,68,.1); border: 1px solid rgba(239,68,68,.3);
    color: #fca5a5; font-size: 13px;
  }
</style>
</head>
<body>
<div class="app">
  <header>
    <h1>Food scanner</h1>
    <span class="pill" id="modePill">Personal</span>
  </header>

  <button id="cameraBtn" class="scan-btn">
    <span class="icon">📷</span>
    <span>Scan label</span>
    <span class="sub">Tap to open camera</span>
  </button>

  <div class="upload-row">
    <button id="uploadBtn">📁 Choose photo</button>
  </div>

  <input type="file" id="cameraInput" accept="image/*" capture="environment">
  <input type="file" id="uploadInput" accept="image/*">

  <div class="status" id="status"></div>
  <div id="preview"></div>
  <div id="result"></div>
  <div id="error"></div>

  <div class="history" id="historyWrap" style="display:none">
    <h2>Recent scans <button class="clear-btn" id="clearBtn" style="float:right">Clear</button></h2>
    <div id="historyList"></div>
  </div>
</div>

<script>
const HISTORY_KEY = 'foodScanner.history.v1';
const MAX_HISTORY = 25;

const $ = (id) => document.getElementById(id);

// ===== Compress image to keep API payloads small =====
async function compressImage(file, maxDim = 1280, quality = 0.78) {
  const dataUrl = await new Promise((resolve, reject) => {
    const r = new FileReader();
    r.onload = () => resolve(r.result);
    r.onerror = reject;
    r.readAsDataURL(file);
  });
  const img = await new Promise((resolve, reject) => {
    const i = new Image();
    i.onload = () => resolve(i);
    i.onerror = reject;
    i.src = dataUrl;
  });
  const ratio = Math.min(1, maxDim / Math.max(img.width, img.height));
  const w = Math.round(img.width * ratio);
  const h = Math.round(img.height * ratio);
  const canvas = document.createElement('canvas');
  canvas.width = w; canvas.height = h;
  const ctx = canvas.getContext('2d');
  ctx.drawImage(img, 0, 0, w, h);
  const out = canvas.toDataURL('image/jpeg', quality);
  return out; // "data:image/jpeg;base64,...."
}

function dataUrlToParts(dataUrl) {
  const m = dataUrl.match(/^data:([^;]+);base64,(.*)$/);
  if (!m) throw new Error('Invalid data URL');
  return { mime: m[1], base64: m[2] };
}

// ===== Render verdict =====
function renderResult(r) {
  const v = r.verdict || 'unclear';
  const cls = `v-${v === 'good' ? 'good' : v === 'sometimes' ? 'sometimes' : v === 'avoid' ? 'avoid' : 'unclear'}`;
  const icon = v === 'good' ? '✓' : v === 'sometimes' ? '!' : v === 'avoid' ? '✕' : '?';
  const labelText = v === 'good' ? 'Good for you' : v === 'sometimes' ? 'Sometimes ok' : v === 'avoid' ? 'Avoid' : 'Unclear';

  const flagsHtml = (r.flags || []).map(f => {
    const lvl = (f.level || 'yellow').toLowerCase();
    return `<div class="flag flag-${lvl}">
      <div class="flag-dot"></div>
      <div><div class="name">${escape(f.ingredient || '')}</div><div class="why">${escape(f.why || '')}</div></div>
    </div>`;
  }).join('');

  const altHtml = r.alternative
    ? `<div class="alternative"><span class="label">Look for instead:</span>${escape(r.alternative)}</div>`
    : '';

  $('result').innerHTML = `
    <div class="result ${cls}">
      <div class="verdict">
        <div class="verdict-dot">${icon}</div>
        <div class="verdict-text">
          <div class="label">${labelText}</div>
          <div class="headline">${escape(r.headline || '')}</div>
        </div>
      </div>
      <div class="summary">${escape(r.summary || '')}</div>
      ${flagsHtml ? `<div class="flags">${flagsHtml}</div>` : ''}
      ${altHtml}
    </div>
  `;
}

function escape(s) {
  return String(s).replace(/[&<>"']/g, c => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
  }[c]));
}

// ===== History =====
function loadHistory() {
  try { return JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]'); }
  catch { return []; }
}
function saveHistory(arr) {
  localStorage.setItem(HISTORY_KEY, JSON.stringify(arr.slice(0, MAX_HISTORY)));
}
function addToHistory(result) {
  const hist = loadHistory();
  hist.unshift({
    t: Date.now(),
    verdict: result.verdict || 'unclear',
    headline: result.headline || '',
  });
  saveHistory(hist);
  renderHistory();
}
function renderHistory() {
  const hist = loadHistory();
  if (!hist.length) { $('historyWrap').style.display = 'none'; return; }
  $('historyWrap').style.display = 'block';
  $('historyList').innerHTML = hist.map(h => {
    const ago = relTime(h.t);
    return `<div class="history-row">
      <div class="history-dot ${h.verdict}"></div>
      <div class="history-text">
        <div class="history-headline">${escape(h.headline)}</div>
        <div class="history-time">${ago}</div>
      </div>
    </div>`;
  }).join('');
}
function relTime(t) {
  const d = (Date.now() - t) / 1000;
  if (d < 60) return 'just now';
  if (d < 3600) return Math.round(d / 60) + ' min ago';
  if (d < 86400) return Math.round(d / 3600) + ' h ago';
  return new Date(t).toLocaleDateString('en-GB', { day: '2-digit', month: 'short' });
}

// ===== Scan flow =====
async function handleFile(file) {
  if (!file) return;
  $('error').innerHTML = '';
  $('result').innerHTML = '';
  $('cameraBtn').disabled = true;
  $('status').innerHTML = '<span class="spinner"></span>Compressing…';

  let compressed;
  try { compressed = await compressImage(file); }
  catch (e) {
    showError('Could not read photo: ' + e.message);
    $('cameraBtn').disabled = false; $('status').innerHTML = '';
    return;
  }
  $('preview').innerHTML = `<div class="preview"><img src="${compressed}"></div>`;

  const { mime, base64 } = dataUrlToParts(compressed);

  $('status').innerHTML = '<span class="spinner"></span>Asking Claude…';

  let resp;
  try {
    resp = await fetch('/api/scan', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ image: base64, mime }),
    });
  } catch (e) {
    showError('Network error: ' + e.message);
    $('cameraBtn').disabled = false; $('status').innerHTML = '';
    return;
  }

  $('cameraBtn').disabled = false;
  $('status').innerHTML = '';

  if (!resp.ok) {
    const t = await resp.text();
    showError('Server error (' + resp.status + '): ' + t.slice(0, 200));
    return;
  }

  let result;
  try { result = await resp.json(); }
  catch (e) { showError('Bad response from server.'); return; }

  if (result.error) { showError(result.error); return; }

  renderResult(result);
  addToHistory(result);
}

function showError(msg) {
  $('error').innerHTML = `<div class="error">${escape(msg)}</div>`;
}

// ===== Wire up =====
$('cameraBtn').addEventListener('click', () => $('cameraInput').click());
$('uploadBtn').addEventListener('click', () => $('uploadInput').click());
$('cameraInput').addEventListener('change', (e) => handleFile(e.target.files[0]));
$('uploadInput').addEventListener('change', (e) => handleFile(e.target.files[0]));
$('clearBtn').addEventListener('click', () => {
  if (confirm('Clear scan history?')) { saveHistory([]); renderHistory(); }
});
renderHistory();
</script>
</body>
</html>
